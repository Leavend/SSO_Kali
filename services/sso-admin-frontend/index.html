<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <script>
      (function () {
        const theme = localStorage.getItem('dev-sso-admin-theme') || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
    <title>Dev-SSO Admin Frontend</title>
    <style>
      :root {
        color-scheme: light;
        --admin-shell-bg: #f8fafc;
        --admin-card: #ffffff;
        --admin-border: #e2e8f0;
        --admin-muted: #e5e7eb;
        --admin-muted-strong: #cbd5e1;
      }

      :root.dark {
        color-scheme: dark;
        --admin-shell-bg: #030303;
        --admin-card: #09090b;
        --admin-border: #27272a;
        --admin-muted: #18181b;
        --admin-muted-strong: #27272a;
      }

      html,
      body,
      #app {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--admin-shell-bg);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .admin-preload-shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
        background: var(--admin-shell-bg);
      }

      .admin-preload-sidebar {
        border-right: 1px solid var(--admin-border);
        background: var(--admin-card);
        padding: 22px 18px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        position: sticky;
        top: 0;
        box-sizing: border-box;
      }

      .admin-preload-sidebar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 32px;
      }

      .admin-preload-logo {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        background: var(--admin-muted);
      }

      .admin-preload-brand-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .admin-preload-nav {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }

      .admin-preload-nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        height: 38px;
        padding: 0 12px;
        border-radius: 8px;
      }

      .admin-preload-nav-icon {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        background: var(--admin-muted);
      }

      .admin-preload-sidebar-footer {
        border-top: 1px solid var(--admin-border);
        padding-top: 16px;
        margin-top: auto;
        display: flex;
        flex-direction: column;
      }

      .admin-preload-main-column {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .admin-preload-topbar {
        height: 56px;
        border-bottom: 1px solid var(--admin-border);
        background: var(--admin-card);
        display: flex;
        align-items: center;
        padding: 0 24px;
        box-sizing: border-box;
      }

      .admin-preload-main {
        padding: 32px 24px;
      }

      .admin-preload-page {
        display: grid;
        gap: 18px;
        width: min(1180px, 100%);
        margin: 0 auto;
      }

      .admin-preload-heading,
      .admin-preload-users {
        display: grid;
        gap: 14px;
      }

      .admin-preload-users {
        grid-template-columns: 320px minmax(0, 1fr);
        align-items: start;
        gap: 24px;
      }

      .admin-preload-panel {
        min-height: 600px;
        border: 1px solid var(--admin-border);
        border-radius: 20px;
        background: var(--admin-card);
        padding: 20px;
      }

      .admin-preload-detail {
        min-height: 720px;
      }

      .admin-preload-line,
      .admin-preload-block {
        display: block;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          var(--admin-muted) 0%,
          var(--admin-muted-strong) 50%,
          var(--admin-muted) 100%
        );
        background-size: 200% 100%;
        animation: admin-preload-skeleton 1.5s infinite linear;
      }

      .admin-preload-line {
        height: 14px;
      }

      .admin-preload-block {
        height: 92px;
        border-radius: 16px;
      }

      @keyframes admin-preload-skeleton {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      @media (max-width: 760px) {
        .admin-preload-shell {
          grid-template-columns: 1fr;
        }

        .admin-preload-users {
          grid-template-columns: 1fr;
        }

        .admin-preload-sidebar {
          display: none;
        }

        .admin-preload-main {
          padding: 28px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="admin-preload-shell" aria-hidden="true">
        <aside class="admin-preload-sidebar">
          <div class="admin-preload-sidebar-brand">
            <div class="admin-preload-logo"></div>
            <div class="admin-preload-brand-text">
              <span class="admin-preload-line" style="width: 80px; height: 10px;"></span>
              <span class="admin-preload-line" style="width: 110px; height: 16px; margin-top: 4px;"></span>
            </div>
          </div>
          <nav class="admin-preload-nav">
            <div class="admin-preload-nav-item"><div class="admin-preload-nav-icon"></div><span class="admin-preload-line" style="width: 70px;"></span></div>
            <div class="admin-preload-nav-item"><div class="admin-preload-nav-icon"></div><span class="admin-preload-line" style="width: 90px;"></span></div>
            <div class="admin-preload-nav-item"><div class="admin-preload-nav-icon"></div><span class="admin-preload-line" style="width: 60px;"></span></div>
            <div class="admin-preload-nav-item"><div class="admin-preload-nav-icon"></div><span class="admin-preload-line" style="width: 80px;"></span></div>
            <div class="admin-preload-nav-item"><div class="admin-preload-nav-icon"></div><span class="admin-preload-line" style="width: 75px;"></span></div>
            <div class="admin-preload-nav-item"><div class="admin-preload-nav-icon"></div><span class="admin-preload-line" style="width: 85px;"></span></div>
          </nav>
          <div class="admin-preload-sidebar-footer">
            <span class="admin-preload-line" style="width: 100px; height: 14px; margin-bottom: 6px;"></span>
            <span class="admin-preload-line" style="width: 130px; height: 10px;"></span>
          </div>
        </aside>
        <div class="admin-preload-main-column">
          <header class="admin-preload-topbar">
            <div class="admin-preload-line" style="width: 180px; height: 14px;"></div>
          </header>
          <main class="admin-preload-main">
            <section class="admin-preload-page">
              <div class="admin-preload-heading">
                <span class="admin-preload-line" style="width: 96px"></span>
                <span class="admin-preload-line" style="width: min(460px, 82%); height: 42px"></span>
                <span class="admin-preload-line" style="width: min(640px, 100%)"></span>
              </div>
              <div class="admin-preload-users">
                <div class="admin-preload-panel">
                  <span class="admin-preload-line" style="width: 42%; margin-bottom: 12px"></span>
                  <span class="admin-preload-block" style="height: 44px; margin-bottom: 10px"></span>
                  <span class="admin-preload-block"></span>
                  <span class="admin-preload-block" style="margin-top: 10px"></span>
                  <span class="admin-preload-block" style="margin-top: 10px"></span>
                </div>
                <div class="admin-preload-panel admin-preload-detail">
                  <span class="admin-preload-block" style="height: 156px; margin-bottom: 24px"></span>
                  <span class="admin-preload-block" style="height: 52px; margin-bottom: 24px"></span>
                  <span class="admin-preload-block" style="height: 220px"></span>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
