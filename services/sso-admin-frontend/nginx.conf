map $http_x_request_id $admin_proxy_request_id {
  default $http_x_request_id;
  "" $request_id;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.timeh.my.id; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; script-src 'self'; style-src 'self'" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /api/admin/ {
    rewrite ^/api/admin/(.*)$ /admin/api/$1 break;
    proxy_pass https://api-sso.timeh.my.id;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api-sso.timeh.my.id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Request-Id $admin_proxy_request_id;
    # Keep the SSO cookie host-only. Backend emits __Host-* cookies without a
    # Domain attribute; shared-domain rewriting would break the __Host- contract.
    proxy_pass_header Set-Cookie;
    proxy_cookie_domain off;
    proxy_redirect off;
  }

  location /api/auth/ {
    proxy_pass https://api-sso.timeh.my.id;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api-sso.timeh.my.id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Request-Id $admin_proxy_request_id;
    # Auth endpoints may mint __Host-* cookies through the same-origin admin proxy.
    proxy_pass_header Set-Cookie;
    proxy_cookie_domain off;
    proxy_redirect off;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, private" always;
  }
}
