<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dev-SSO Portal — Single Sign-On Platform" />
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!--
      ISS-PERF5: preconnect to the SSO API origin so the first auth/session
      request starts its TCP+TLS handshake before Vue finishes mounting.
    -->
    <link rel="preconnect" href="https://api-sso.timeh.my.id" crossorigin />
    <link rel="dns-prefetch" href="https://api-sso.timeh.my.id" />

    <!--
      ISS-PERF3 (P1): self-hosted Instrument Serif woff2.
      - Removed the render-blocking Google Fonts <link> stylesheet.
      - Inlined preload tells the browser to fetch the woff2 with high
        priority so the LCP element is painted with the correct face
        on the first frame, not after a 300-800 ms third-party handshake.
      - `font-display: swap` in main.css guarantees the text remains
        visible during the font swap.
    -->
    <link
      rel="preload"
      href="/fonts/instrument-serif-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!--
      ISS-PERF2 (P1): i18n shell. The Vite plugin `injectI18nShell` reads
      `src/locales/{id,en}/shell.json` and replaces this marker with a
      <script type="application/json" id="__sso_i18n_shell__">{…}</script>
      tag containing the per-locale shell translations. This lets the SPA
      render brand/nav/splash/login labels **synchronously** with no JS
      download and no FOUC.
    -->
    <!-- sso:i18n:shell -->

    <script>
      (function () {
        const theme = localStorage.getItem('dev-sso-theme') || 'auto';
        const isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>
    <title>Dev-SSO Portal</title>
    <style>
      /* Inline critical loading screen — visible before Vue mounts */
      :root {
        --splash-bg: #ffffff;
        --card-bg: #ffffff;
        --border-color: #e2e8f0;
        --line-color: #e2e8f0;
        --header-bg: rgba(255, 255, 255, 0.7);
        --splash-text: #64748b;
      }
      :root.dark {
        --splash-bg: #0f1117;
        --card-bg: #181a20;
        --border-color: rgba(255, 255, 255, 0.1);
        --line-color: #27272a;
        --header-bg: rgba(15, 17, 23, 0.75);
        --splash-text: #a1a1aa;
      }
      body {
        margin: 0;
        background: var(--splash-bg);
      }
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        background: var(--splash-bg);
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }
      #app-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .skeleton-header {
        height: 56px;
        border-bottom: 1px solid var(--border-color);
        background: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 30;
        box-sizing: border-box;
      }
      .skeleton-header-inner {
        width: 100%;
        max-width: 1280px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
      }
      .skeleton-brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .skeleton-logo {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--line-color);
      }
      .skeleton-brand-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .skeleton-nav {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .skeleton-nav-item {
        width: 64px;
        height: 16px;
        border-radius: 4px;
        background: var(--line-color);
      }
      .skeleton-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .skeleton-action-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--line-color);
      }
      .skeleton-hamburger {
        display: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--line-color);
      }
      .skeleton-main {
        flex: 1;
        padding-top: 88px;
        padding-bottom: 32px;
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        padding-left: 24px;
        padding-right: 24px;
        box-sizing: border-box;
      }
      .skeleton-page-header {
        margin-bottom: 32px;
      }
      .skeleton-line {
        height: 12px;
        border-radius: 4px;
        background: var(--line-color);
      }
      .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }
      .skeleton-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 24px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .skeleton-footer {
        height: 60px;
        border-top: 1px solid var(--border-color);
        background: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        margin-top: auto;
      }
      .skeleton-footer-inner {
        width: 100%;
        max-width: 1280px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
      }

      /* Shimmer animations */
      .skeleton-logo,
      .skeleton-nav-item,
      .skeleton-action-btn,
      .skeleton-hamburger,
      .skeleton-line,
      .skeleton-card {
        position: relative;
        overflow: hidden;
      }
      .skeleton-logo::after,
      .skeleton-nav-item::after,
      .skeleton-action-btn::after,
      .skeleton-hamburger::after,
      .skeleton-line::after,
      .skeleton-card::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.08),
          transparent
        );
        animation: shimmer 1.5s infinite;
      }
      :root:not(.dark) .skeleton-logo::after,
      :root:not(.dark) .skeleton-nav-item::after,
      :root:not(.dark) .skeleton-action-btn::after,
      :root:not(.dark) .skeleton-hamburger::after,
      :root:not(.dark) .skeleton-line::after,
      :root:not(.dark) .skeleton-card::after {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 0, 0, 0.04),
          transparent
        );
      }
      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }

      @media (max-width: 767px) {
        .skeleton-nav {
          display: none !important;
        }
        .skeleton-actions .skeleton-action-btn:nth-child(1),
        .skeleton-actions .skeleton-action-btn:nth-child(2) {
          display: none !important;
        }
        .skeleton-hamburger {
          display: block !important;
        }
        .skeleton-grid {
          grid-template-columns: 1fr;
        }
        .skeleton-footer-inner {
          flex-direction: column;
          gap: 8px;
          text-align: center;
        }
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen: visible instantly, removed after Vue mount -->
    <div id="app-loader" role="status" aria-live="polite" aria-label="Memuat aplikasi">
      <span class="sr-only">Memuat aplikasi...</span>
      <header class="skeleton-header">
        <div class="skeleton-header-inner">
          <div class="skeleton-brand">
            <div class="skeleton-logo"></div>
            <div class="skeleton-brand-text">
              <div class="skeleton-line" style="width: 60px; height: 12px;"></div>
              <div class="skeleton-line" style="width: 40px; height: 8px; margin-top: 4px;"></div>
            </div>
          </div>
          <nav class="skeleton-nav">
            <div class="skeleton-nav-item"></div>
            <div class="skeleton-nav-item"></div>
            <div class="skeleton-nav-item"></div>
            <div class="skeleton-nav-item"></div>
            <div class="skeleton-nav-item"></div>
            <div class="skeleton-nav-item"></div>
          </nav>
          <div class="skeleton-actions">
            <div class="skeleton-action-btn"></div>
            <div class="skeleton-action-btn"></div>
            <div class="skeleton-action-btn"></div>
          </div>
          <div class="skeleton-hamburger"></div>
        </div>
      </header>

      <main class="skeleton-main">
        <div class="skeleton-page-header">
          <div class="skeleton-line" style="width: 140px; height: 28px; margin-bottom: 12px;"></div>
          <div class="skeleton-line" style="width: 240px; height: 14px;"></div>
        </div>
        <div class="skeleton-grid">
          <div class="skeleton-card">
            <div class="skeleton-line" style="width: 40%; height: 16px; margin-bottom: 8px;"></div>
            <div class="skeleton-line" style="width: 90%; height: 12px;"></div>
            <div class="skeleton-line" style="width: 80%; height: 12px;"></div>
            <div class="skeleton-line" style="width: 60%; height: 12px;"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line" style="width: 35%; height: 16px; margin-bottom: 8px;"></div>
            <div class="skeleton-line" style="width: 85%; height: 12px;"></div>
            <div class="skeleton-line" style="width: 75%; height: 12px;"></div>
            <div class="skeleton-line" style="width: 50%; height: 12px;"></div>
          </div>
        </div>
      </main>

      <footer class="skeleton-footer">
        <div class="skeleton-footer-inner">
          <div class="skeleton-line" style="width: 120px; height: 12px;"></div>
          <div class="skeleton-line" style="width: 180px; height: 12px;"></div>
        </div>
      </footer>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
