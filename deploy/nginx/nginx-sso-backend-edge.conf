# Canonical Nginx edge config for api-sso.timeh.my.id.
#
# Install notes:
# - This snippet expects the SSO backend to listen on 127.0.0.1:8200.
# - Place proxy_cache_path in the nginx http context.
# - Place server/location blocks in the api-sso.timeh.my.id server.
# - Keep TLS certificate directives from the active VPS config.

# http context
proxy_cache_path /var/cache/nginx/sso_oidc_metadata
    levels=1:2
    keys_zone=sso_oidc_metadata:10m
    max_size=64m
    inactive=1h
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/sso_operational_routes
    levels=1:2
    keys_zone=sso_operational_routes:10m
    max_size=32m
    inactive=10m
    use_temp_path=off;

map $request_uri $sso_oidc_metadata_cache_control {
    default "public, max-age=300, stale-while-revalidate=60";
    "/.well-known/openid-configuration" "public, max-age=300, stale-while-revalidate=60";
}

upstream sso_backend_upstream {
    server 127.0.0.1:8200;
    keepalive 64;
}

# server context
location = /up {
    access_log off;
    add_header Content-Type text/plain always;
    add_header Cache-Control "no-store" always;
    return 200 "ok\n";
}

location = /health {
    access_log off;
    add_header Content-Type application/json always;
    add_header Cache-Control "no-store" always;
    return 200 '{"service":"sso-backend","healthy":true,"edge":"nginx"}\n';
}

location = /ready {
    proxy_pass http://sso_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_cache sso_operational_routes;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 1s;
    proxy_cache_valid 503 1s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    proxy_connect_timeout 1s;
    proxy_send_timeout 3s;
    proxy_read_timeout 3s;

    add_header X-Edge-Cache $upstream_cache_status always;
    add_header Cache-Control "no-store" always;
}

location = /_internal/performance-metrics {
    allow 127.0.0.1;
    allow ::1;
    # Add private monitoring CIDRs here, for example:
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # allow 192.168.0.0/16;
    deny all;

    proxy_pass http://sso_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache sso_operational_routes;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 1s;
    proxy_cache_valid 403 1s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    proxy_connect_timeout 1s;
    proxy_send_timeout 3s;
    proxy_read_timeout 3s;

    add_header X-Edge-Cache $upstream_cache_status always;
    add_header Cache-Control "private, no-store" always;
}

location = /_internal/queue-metrics {
    allow 127.0.0.1;
    allow ::1;
    # Add private monitoring CIDRs here, for example:
