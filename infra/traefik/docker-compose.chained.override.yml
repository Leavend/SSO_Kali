services:
  proxy:
    command:
      - --configFile=/etc/traefik/traefik.yml
      # ISS-PERF1: load edge compression middleware from dynamic file.
      - --providers.file.filename=/etc/traefik/dynamic-compress.yml
    ports:
      - "127.0.0.1:18080:80"
      - "127.0.0.1:18443:443"
    volumes:
      - ./infra/traefik/traefik.chained.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic-compress.yml:/etc/traefik/dynamic-compress.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
