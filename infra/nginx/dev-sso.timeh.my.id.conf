# ──────────────────────────────────────────────
# HTTP → HTTPS redirect (all SSO domains)
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name dev-sso.timeh.my.id id.dev-sso.timeh.my.id app-a.timeh.my.id app-b.timeh.my.id;
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────
# Shared SSL + proxy defaults
# ──────────────────────────────────────────────
ssl_certificate     /etc/letsencrypt/live/dev-sso.timeh.my.id/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/dev-sso.timeh.my.id/privkey.pem;
include             /etc/letsencrypt/options-ssl-nginx.conf;
ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ──────────────────────────────────────────────
# dev-sso.timeh.my.id — SSO Backend API + Admin Panel Frontend
# ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name dev-sso.timeh.my.id;

    client_max_body_size 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── OIDC endpoints → sso-backend (Laravel) ──
    location = /authorize         { proxy_pass http://127.0.0.1:8200; }
    location = /token             { proxy_pass http://127.0.0.1:8200; }
    location = /userinfo          { proxy_pass http://127.0.0.1:8200; }
    location = /jwks              { proxy_pass http://127.0.0.1:8200; }
    location = /revocation        { proxy_pass http://127.0.0.1:8200; }
    location = /health            { proxy_pass http://127.0.0.1:8200; }
    location = /up                { proxy_pass http://127.0.0.1:8200; }

    location ^~ /connect/         { proxy_pass http://127.0.0.1:8200; }
    location ^~ /callbacks/       { proxy_pass http://127.0.0.1:8200; }
    location ^~ /oauth2/          { proxy_pass http://127.0.0.1:8200; }
    location ^~ /.well-known/     { proxy_pass http://127.0.0.1:8200; }
    location ^~ /api/profile      { proxy_pass http://127.0.0.1:8200; }

    # ── Admin API → sso-backend (Laravel) ──
    location ^~ /admin/api/       { proxy_pass http://127.0.0.1:8200; }

    # ── Everything else → sso-frontend (Next.js Admin Panel) ──
    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}

# ──────────────────────────────────────────────
# id.dev-sso.timeh.my.id — ZITADEL Identity Engine
# ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name id.dev-sso.timeh.my.id;

    client_max_body_size 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://127.0.0.1:18080;
    }
}

