# Preserve the original request URI and query string across the proxy chain.
# Omitting a URI suffix on proxy_pass keeps prompt=login, max_age, state, code,
# and similar OIDC parameters intact for upstream services.
include /etc/nginx/snippets/sso-forwarded-headers.conf;

proxy_pass_request_headers on;
proxy_pass_request_body on;
proxy_cookie_domain off;
proxy_no_cache 1;
proxy_cache_bypass 1;

proxy_hide_header Cache-Control;
proxy_hide_header Pragma;
proxy_hide_header Expires;

add_header Cache-Control "no-store, no-cache, private, max-age=0, must-revalidate" always;
add_header Pragma "no-cache" always;
add_header Expires "0" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; form-action 'self' https://id.dev-sso.timeh.my.id; connect-src 'self'; img-src 'self' data:; font-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" always;

proxy_pass http://sso_traefik_web;
