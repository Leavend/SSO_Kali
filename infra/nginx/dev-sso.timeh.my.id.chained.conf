upstream sso_traefik_web {
    server 127.0.0.1:18080;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_req_zone $binary_remote_addr zone=sso_frontend_login_per_ip:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=sso_broker_authorize_per_ip:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=sso_broker_callback_per_ip:10m rate=180r/m;
limit_req_zone $binary_remote_addr zone=sso_frontend_callback_per_ip:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=sso_admin_bootstrap_per_ip:10m rate=60r/m;
limit_req_status 429;

server {
    listen 80;
    server_name dev-sso.timeh.my.id debug.dev-sso.timeh.my.id id.dev-sso.timeh.my.id app-a.timeh.my.id app-b.timeh.my.id;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name id.dev-sso.timeh.my.id;

    ssl_certificate     /etc/letsencrypt/live/dev-sso.timeh.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-sso.timeh.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /favicon.ico {
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_pass http://sso_traefik_web/ui/v2/login/favicon.ico;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /apple-touch-icon.png {
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_pass http://sso_traefik_web/ui/v2/login/apple-touch-icon.png;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location ^~ /ui/v2/login/ {
        error_page 418 = @id_dev_sso_login_english;
        if ($cookie_NEXT_LOCALE = en) {
            return 418;
        }
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        include /etc/nginx/snippets/id-dev-sso-login-copy.conf;
        proxy_pass http://sso_traefik_web;
    }

    location @id_dev_sso_login_english {
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        include /etc/nginx/snippets/id-dev-sso-login-copy-en.conf;
        proxy_pass http://sso_traefik_web;
    }

    location / {
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_pass http://sso_traefik_web;
    }
}

server {
    listen 443 ssl http2;
    server_name dev-sso.timeh.my.id app-a.timeh.my.id app-b.timeh.my.id;

    ssl_certificate     /etc/letsencrypt/live/dev-sso.timeh.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-sso.timeh.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /telescope {
        return 404;
    }

    location ^~ /vendor/telescope/ {
        return 404;
    }

    # ── JWKS endpoint — cacheable, NOT auth-sensitive ──
    location = /jwks {
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_pass http://sso_traefik_web;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /.well-known/openid-configuration {
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_pass http://sso_traefik_web;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=300" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /authorize {
        limit_req zone=sso_broker_authorize_per_ip burst=40 nodelay;
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /oauth2/authorize {
        limit_req zone=sso_broker_authorize_per_ip burst=40 nodelay;
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /token {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /oauth2/token {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /revocation {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /oauth2/revocation {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /connect/register-session {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /connect/logout {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location ^~ /callbacks/ {
        limit_req zone=sso_broker_callback_per_ip burst=60 nodelay;
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /auth/login {
        limit_req zone=sso_frontend_login_per_ip burst=10 nodelay;
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /auth/callback {
        limit_req zone=sso_frontend_callback_per_ip burst=20 nodelay;
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location ^~ /auth/ {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location ^~ /admin/api/ {
        limit_req zone=sso_admin_bootstrap_per_ip burst=30 nodelay;
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /access-denied {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /reauth-required {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /invalid-credentials {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location = /handshake-failed {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location / {
        include /etc/nginx/snippets/sso-forwarded-headers.conf;
        proxy_pass http://sso_traefik_web;
    }
}

server {
    listen 443 ssl http2;
    server_name debug.dev-sso.timeh.my.id;

    # Reissue the existing certificate with debug.dev-sso.timeh.my.id as a SAN
    # before enabling this virtual host on the VPS.
    ssl_certificate     /etc/letsencrypt/live/dev-sso.timeh.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-sso.timeh.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /telescope {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location ^~ /vendor/telescope/ {
        include /etc/nginx/snippets/sso-auth-sensitive-proxy.conf;
    }

    location / {
        return 404;
    }
}
