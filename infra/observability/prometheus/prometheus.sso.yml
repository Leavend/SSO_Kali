global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/sso-kpis.yml
  - /etc/prometheus/rules/admin-auth-funnel.yml

scrape_configs:
  - job_name: traefik
    static_configs:
      - targets:
          - proxy:9100

  - job_name: sso-kpi-exporter
    static_configs:
      - targets:
          - sso-kpi-exporter:9108

  - job_name: sso-public-blackbox
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - https://dev-sso.timeh.my.id/
          - https://dev-sso.timeh.my.id/.well-known/openid-configuration
          - https://id.dev-sso.timeh.my.id/.well-known/openid-configuration
          - https://id.dev-sso.timeh.my.id/ui/v2/login
          - https://id.dev-sso.timeh.my.id/ui/v2/auth/login
          - https://id.dev-sso.timeh.my.id/ui/v2/auth/healthz
          - https://app-a.timeh.my.id/
          - https://app-b.timeh.my.id/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
