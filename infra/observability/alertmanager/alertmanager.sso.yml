global:
  resolve_timeout: 5m

route:
  receiver: slack-sso
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-sso
      continue: true

receivers:
  - name: slack-sso
    slack_configs:
      - api_url: '${ALERTMANAGER_SLACK_WEBHOOK_URL}'
        channel: '#sso-oncall'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }} - {{ .Annotations.description }}{{ end }}'

  - name: pagerduty-sso
    pagerduty_configs:
      - routing_key: '${ALERTMANAGER_PAGERDUTY_ROUTING_KEY}'
        severity: '{{ .CommonLabels.severity }}'
        send_resolved: true
        description: '{{ .CommonAnnotations.summary }}'
