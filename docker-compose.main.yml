name: ${COMPOSE_PROJECT_NAME:-sso-backend-prod}

x-sso-backend-env: &sso-backend-env
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${SSO_BACKEND_APP_KEY}
  APP_URL: ${SSO_BASE_URL}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${SSO_BACKEND_DB:-sso_backend}
  DB_USERNAME: ${SSO_BACKEND_DB_USER:-${POSTGRES_ADMIN_USER:-sso}}
  DB_PASSWORD: ${SSO_BACKEND_DB_PASSWORD:-${POSTGRES_ADMIN_PASSWORD}}
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  SESSION_EXPIRE_ON_CLOSE: ${SESSION_EXPIRE_ON_CLOSE:-false}
  SSO_SESSION_TTL_MINUTES: ${SSO_SESSION_TTL_MINUTES:-43200}
  SSO_SESSION_IDLE_MINUTES: ${SSO_SESSION_IDLE_MINUTES:-10080}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_PORT: 6379
  REDIS_DB: 2
  REDIS_CACHE_DB: 3
  SSO_BASE_URL: ${SSO_BASE_URL}
  SSO_FRONTEND_URL: ${SSO_FRONTEND_URL:-https://sso.timeh.my.id}
  SSO_CORS_ALLOWED_ORIGINS: ${SSO_CORS_ALLOWED_ORIGINS:-${SSO_FRONTEND_URL:-https://sso.timeh.my.id}}
  SSO_ISSUER: ${SSO_ISSUER:-${SSO_BASE_URL}}
  SSO_RESOURCE_AUDIENCE: ${SSO_RESOURCE_AUDIENCE:-sso-resource-api}
  OIDC_SIGNING_ALG: ${OIDC_SIGNING_ALG:-ES256}
  OIDC_SIGNING_KID: ${OIDC_SIGNING_KID:-sso-main-key}
  OIDC_PRIVATE_KEY_PATH: ${OIDC_PRIVATE_KEY_PATH:-/app/storage/app/oidc/private.pem}
  OIDC_PUBLIC_KEY_PATH: ${OIDC_PUBLIC_KEY_PATH:-/app/storage/app/oidc/public.pem}
  OIDC_ACCESS_TOKEN_TTL: ${OIDC_ACCESS_TOKEN_TTL:-900}
  OIDC_ID_TOKEN_TTL: ${OIDC_ID_TOKEN_TTL:-900}
  OIDC_REFRESH_TOKEN_TTL_DAYS: ${OIDC_REFRESH_TOKEN_TTL_DAYS:-30}
  OIDC_AUTH_REQUEST_TTL: ${OIDC_AUTH_REQUEST_TTL:-300}
  OIDC_AUTHORIZATION_CODE_TTL: ${OIDC_AUTHORIZATION_CODE_TTL:-60}
  ADMIN_PANEL_CLIENT_ID: ${ADMIN_PANEL_CLIENT_ID:-sso-admin-panel}
  ADMIN_PANEL_ADMIN_EMAIL: ${ADMIN_PANEL_ADMIN_EMAIL:-admin@example.com}
  ADMIN_PANEL_SESSION_MANAGEMENT_ROLES: ${ADMIN_PANEL_SESSION_MANAGEMENT_ROLES:-admin}
  ADMIN_PANEL_REQUIRE_MFA: ${ADMIN_PANEL_REQUIRE_MFA:-false}
  ADMIN_PANEL_MFA_ACCEPTED_AMR: ${ADMIN_PANEL_MFA_ACCEPTED_AMR:-pwd}
  SSO_DSR_AUTOMATION_SUBJECT_ID: ${SSO_DSR_AUTOMATION_SUBJECT_ID:-system-dsr-automation}
  SSO_DSR_AUTOMATION_EMAIL: ${SSO_DSR_AUTOMATION_EMAIL:-system-dsr-automation@example.invalid}
  OCTANE_SERVER: frankenphp
  OCTANE_HTTPS: ${OCTANE_HTTPS:-true}
  OCTANE_GARBAGE_THRESHOLD_MB: ${OCTANE_GARBAGE_THRESHOLD_MB:-50}
  OCTANE_MAX_EXECUTION_TIME: ${OCTANE_MAX_EXECUTION_TIME:-30}
  SSO_BACKEND_OCTANE_HOST: 0.0.0.0
  SSO_BACKEND_OCTANE_PORT: 8000
  SSO_BACKEND_OCTANE_WORKERS: ${SSO_BACKEND_OCTANE_WORKERS:-auto}
  SSO_BACKEND_OCTANE_MAX_REQUESTS: ${SSO_BACKEND_OCTANE_MAX_REQUESTS:-1000}
  SSO_BACKEND_WAIT_FOR_DB: ${SSO_BACKEND_WAIT_FOR_DB:-false}
  SSO_BACKEND_PASSPORT_KEYS: ${SSO_BACKEND_PASSPORT_KEYS:-false}
  SSO_BACKEND_EVENT_CACHE: ${SSO_BACKEND_EVENT_CACHE:-true}
  SSO_BACKEND_FIX_PERMISSIONS: ${SSO_BACKEND_FIX_PERMISSIONS:-true}

x-sso-frontend-env: &sso-frontend-env
  PORT: 3000
  VITE_SSO_FRONTEND_BASE_URL: ${SSO_FRONTEND_URL:-https://sso.timeh.my.id}
  NEXT_PUBLIC_APP_BASE_URL: ${SSO_FRONTEND_URL:-https://sso.timeh.my.id}
  VITE_SSO_BASE_URL: ${SSO_BASE_URL:-https://api-sso.timeh.my.id}
  NEXT_PUBLIC_SSO_BASE_URL: ${SSO_BASE_URL:-https://api-sso.timeh.my.id}
  VITE_CLIENT_ID: ${SSO_FRONTEND_CLIENT_ID:-sso-frontend-portal}
  NEXT_PUBLIC_CLIENT_ID: ${SSO_FRONTEND_CLIENT_ID:-sso-frontend-portal}
  SSO_INTERNAL_BASE_URL: ${SSO_INTERNAL_BASE_URL:-http://sso-backend:8000}
  SSO_INTERNAL_TOKEN_URL: ${SSO_INTERNAL_TOKEN_URL:-http://sso-backend:8000/token}
  SSO_INTERNAL_JWKS_URL: ${SSO_INTERNAL_JWKS_URL:-http://sso-backend:8000/jwks}
  SSO_FRONTEND_SESSION_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
  SESSION_ENCRYPTION_SECRET: ${SESSION_ENCRYPTION_SECRET:?SESSION_ENCRYPTION_SECRET is required}
  SSO_BACKEND_UPSTREAM: sso-backend:8000
  SSO_FRONTEND_SERVER_NAME: ${SSO_FRONTEND_SERVER_NAME:-_}
  SSO_CSP_CONNECT_SRC: ${SSO_CSP_CONNECT_SRC:-https://api-sso.timeh.my.id}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sso}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-sso}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sso-main
    mem_limit: 1024m
    cpus: "1.00"

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    init: true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 192mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 15s
    volumes:
      - redis-data:/data
    networks:
      - sso-main
    mem_limit: 256m
    cpus: "0.25"

  sso-backend:
    image: ${SSO_IMAGE_PREFIX:-ghcr.io/leavend/sso-kali}/sso-backend:${SSO_DEPLOY_TAG:-main}
    restart: unless-stopped
    init: true
    environment: *sso-backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/up || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 60s
    volumes:
      - sso-backend-storage:/app/storage
      - ./.secrets/oidc:/app/storage/app/oidc:ro
    ports:
      - ${SSO_BACKEND_BIND:-127.0.0.1:8200}:8000
    networks:
      - sso-main
    mem_limit: 768m
    cpus: "0.75"

  sso-backend-worker:
    image: ${SSO_IMAGE_PREFIX:-ghcr.io/leavend/sso-kali}/sso-backend:${SSO_DEPLOY_TAG:-main}
    restart: unless-stopped
    init: true
    environment: *sso-backend-env
    command: ["php", "artisan", "queue:work", "redis", "--sleep=1", "--tries=3", "--timeout=90", "--memory=192"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sso-backend:
        condition: service_healthy
    volumes:
      - sso-backend-storage:/app/storage
      - ./.secrets/oidc:/app/storage/app/oidc:ro
    networks:
      - sso-main
    mem_limit: 384m
    cpus: "0.25"

  sso-backend-scheduler:
    image: ${SSO_IMAGE_PREFIX:-ghcr.io/leavend/sso-kali}/sso-backend:${SSO_DEPLOY_TAG:-main}
    restart: unless-stopped
    init: true
    environment: *sso-backend-env
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sso-backend:
        condition: service_healthy
    volumes:
      - sso-backend-storage:/app/storage
      - ./.secrets/oidc:/app/storage/app/oidc:ro
    networks:
      - sso-main
    mem_limit: 256m
    cpus: "0.10"

  sso-frontend:
    image: ${SSO_IMAGE_PREFIX:-ghcr.io/leavend/sso-kali}/sso-frontend:${SSO_DEPLOY_TAG:-main}
    container_name: ${SSO_FRONTEND_CONTAINER:-sso-frontend-prod}
    restart: unless-stopped
    init: true
    environment: *sso-frontend-env
    depends_on:
      sso-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 30s
    ports:
      - ${SSO_FRONTEND_BIND:-127.0.0.1:3080}:3000
    networks:
      - sso-main
    mem_limit: 256m
    cpus: "0.25"

networks:
  sso-main:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  sso-backend-storage:
