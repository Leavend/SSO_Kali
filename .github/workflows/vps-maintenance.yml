name: VPS Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - check-env
          - audit-sso-runtime-policy
          - apply-sso-runtime-policy
          - diagnose-sso-performance
          - apply-sso-efficiency-profile
          - audit-pg-stat-statements
          - enable-pg-stat-statements-extension
          - collect-login-flow-logs
          - set-login-api-timeout
          - stop-noncritical-container
          - set-app-b-hash
      service_name:
        description: "SSO service for runtime policy apply/audit"
        required: false
        type: string
        default: "all"
      container_name:
        description: "Whitelisted non-critical container to stop"
        required: false
        type: string
        default: "n8n-n8n-1"
      secret_plaintext:
        description: "Plaintext secret for hash generation (only for set-app-b-hash)"
        required: false
        type: string
      log_since:
        description: "Log lookback window for collect-login-flow-logs"
        required: false
        type: string
        default: "30m"
      login_timeout_ms:
        description: "ZITADEL_LOGIN_API_TIMEOUT_MS for set-login-api-timeout"
        required: false
        type: string
        default: "15000"

permissions:
  contents: read

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR || '/opt/sso-prototype-dev' }}
  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  SSH_CONNECT_TIMEOUT: "20"
  SSH_RETRY_ATTEMPTS: "5"
  SSH_RETRY_DELAY_SECONDS: "15"

jobs:
  maintenance:
    name: "VPS Maintenance"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for i in 1 2 3; do
            ssh-keyscan -T 10 -p "${{ env.VPS_SSH_PORT }}" -H "${{ env.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            sleep 5
          done

      - name: Preflight SSH reachability
        run: |
          command -v nc >/dev/null 2>&1 || {
            echo "Missing required command: nc" >&2
            exit 2
          }

          echo "Checking SSH reachability for configured VPS endpoint."
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh nc -vz -w "${{ env.SSH_CONNECT_TIMEOUT }}" \
            "${{ env.VPS_HOST }}" "${{ env.VPS_SSH_PORT }}"

      - name: Check current env
        if: inputs.action == 'check-env'
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" bash <<'REMOTE'
          PROJECT_DIR="${{ env.VPS_PROJECT_DIR }}"
          echo "=== APP_B_CLIENT_SECRET_HASH ==="
          if grep -Eq "^APP_B_CLIENT_SECRET_HASH='\\\$argon2id\\\$" "$PROJECT_DIR/.env.dev" 2>/dev/null; then
            echo "SET: quoted Argon2id literal"
          else
            echo "NOT SET OR UNSAFE FORMAT"
          fi
          echo ""
          echo "=== Argon2id env params ==="
          if grep -Eq "^OIDC_CLIENT_SECRET_HASH='\\\$argon2id\\\$" "$PROJECT_DIR/.env.dev" 2>/dev/null; then
            echo "SET: quoted Argon2id literal"
          else
            echo "NOT SET OR NOT ARGON2ID"
          fi
          echo ""
          echo "=== sso-backend status ==="
          sudo docker compose -f "$PROJECT_DIR/docker-compose.dev.yml" \
            --env-file "$PROJECT_DIR/.env.dev" \
            ps sso-backend 2>/dev/null || echo "sso-backend not running"
          echo "✅ check-env complete"
          REMOTE

      - name: Run SSO performance diagnostic
        if: inputs.action == 'diagnose-sso-performance'
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-diagnose-sso-performance.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/vps-diagnose-sso-performance.sh

          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo install -m 0755 /tmp/vps-diagnose-sso-performance.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-diagnose-sso-performance.sh' && sudo bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-diagnose-sso-performance.sh' --project-dir '${{ env.VPS_PROJECT_DIR }}' --samples 5 && rm -f /tmp/vps-diagnose-sso-performance.sh"

      - name: Apply SSO efficiency profile
        if: inputs.action == 'apply-sso-efficiency-profile'
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-apply-sso-efficiency-profile.sh \
            docker-compose.dev.yml \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/

          CI_RETRY_ATTEMPTS="1" CI_RETRY_DELAY_SECONDS="0" \
          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo install -m 0755 /tmp/vps-apply-sso-efficiency-profile.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-apply-sso-efficiency-profile.sh' && sudo bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-apply-sso-efficiency-profile.sh' --project-dir '${{ env.VPS_PROJECT_DIR }}' --mode apply --compose-source /tmp/docker-compose.dev.yml --stop-demo-services true --stop-inactive-login true --recreate-data-plane false --compose-up-timeout-seconds 240 --health-timeout-seconds 300 && rm -f /tmp/vps-apply-sso-efficiency-profile.sh /tmp/docker-compose.dev.yml"

      - name: Audit PostgreSQL pg_stat_statements
        if: inputs.action == 'audit-pg-stat-statements' || inputs.action == 'enable-pg-stat-statements-extension'
        run: |
          MODE="audit"
          if [ "${{ inputs.action }}" = "enable-pg-stat-statements-extension" ]; then
            MODE="enable-extension"
          fi

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          REMOTE_MODE="$(printf '%q' "$MODE")"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-pg-stat-statements.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/vps-pg-stat-statements.sh

          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo install -m 0755 /tmp/vps-pg-stat-statements.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-pg-stat-statements.sh' && sudo bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-pg-stat-statements.sh' --project-dir '${{ env.VPS_PROJECT_DIR }}' --mode ${REMOTE_MODE} && rm -f /tmp/vps-pg-stat-statements.sh"

      - name: Collect login flow logs
        if: inputs.action == 'collect-login-flow-logs'
        run: |
          LOG_SINCE="${{ inputs.log_since }}"
          case "$LOG_SINCE" in
            *[!0-9smh]*|"") echo "Refusing unsupported log_since: $LOG_SINCE" >&2; exit 3 ;;
            *) ;;
          esac

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          REMOTE_LOG_SINCE="$(printf '%q' "$LOG_SINCE")"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-collect-login-flow-logs.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/vps-collect-login-flow-logs.sh

          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo install -m 0755 /tmp/vps-collect-login-flow-logs.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-collect-login-flow-logs.sh' && sudo bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-collect-login-flow-logs.sh' --project-dir '${{ env.VPS_PROJECT_DIR }}' --since ${REMOTE_LOG_SINCE} --samples 5 && rm -f /tmp/vps-collect-login-flow-logs.sh"

      - name: Set Vue login API timeout
        if: inputs.action == 'set-login-api-timeout'
        run: |
          TIMEOUT_MS="${{ inputs.login_timeout_ms }}"
          if ! [[ "$TIMEOUT_MS" =~ ^[1-9][0-9]*$ ]]; then
            echo "Refusing unsupported login_timeout_ms: $TIMEOUT_MS" >&2
            exit 3
          fi

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          REMOTE_TIMEOUT_MS="$(printf '%q' "$TIMEOUT_MS")"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-set-login-api-timeout.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/vps-set-login-api-timeout.sh

          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo install -m 0755 /tmp/vps-set-login-api-timeout.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-set-login-api-timeout.sh' && sudo bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-set-login-api-timeout.sh' --project-dir '${{ env.VPS_PROJECT_DIR }}' --timeout-ms ${REMOTE_TIMEOUT_MS} && rm -f /tmp/vps-set-login-api-timeout.sh"

      - name: Audit SSO runtime resource policy
        if: inputs.action == 'audit-sso-runtime-policy' || inputs.action == 'apply-sso-runtime-policy'
        run: |
          SERVICE_NAME="${{ inputs.service_name }}"
          case "$SERVICE_NAME" in
            all|proxy|postgres|redis|zitadel-api|zitadel-login|zitadel-login-vue|sso-backend|sso-backend-worker|sso-frontend|sso-admin-vue|app-a-next|app-b-laravel) ;;
            *)
              echo "Refusing unsupported service_name: $SERVICE_NAME" >&2
              exit 3
              ;;
          esac

          MODE="audit"
          if [ "${{ inputs.action }}" = "apply-sso-runtime-policy" ]; then
            MODE="apply"
          fi

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          REMOTE_SERVICE_NAME="$(printf '%q' "$SERVICE_NAME")"
          REMOTE_MODE="$(printf '%q' "$MODE")"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-update-sso-runtime-budget.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/vps-update-sso-runtime-budget.sh

          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo install -m 0755 /tmp/vps-update-sso-runtime-budget.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-update-sso-runtime-budget.sh' && sudo bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-update-sso-runtime-budget.sh' --project-dir '${{ env.VPS_PROJECT_DIR }}' --mode ${REMOTE_MODE} --service ${REMOTE_SERVICE_NAME} && rm -f /tmp/vps-update-sso-runtime-budget.sh"

      - name: Stop non-critical container
        if: inputs.action == 'stop-noncritical-container'
        run: |
          CONTAINER_NAME="${{ inputs.container_name }}"
          case "$CONTAINER_NAME" in
            n8n-n8n-1) ;;
            *)
              echo "Refusing to stop non-whitelisted container: $CONTAINER_NAME" >&2
              exit 3
              ;;
          esac

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          REMOTE_CONTAINER_NAME="$(printf '%q' "$CONTAINER_NAME")"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-stop-noncritical-container.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/vps-stop-noncritical-container.sh

          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo install -m 0755 /tmp/vps-stop-noncritical-container.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-stop-noncritical-container.sh' && sudo bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-stop-noncritical-container.sh' ${REMOTE_CONTAINER_NAME} && rm -f /tmp/vps-stop-noncritical-container.sh"

      - name: Generate and set APP_B hash
        if: inputs.action == 'set-app-b-hash'
        run: |
          PLAINTEXT="${{ inputs.secret_plaintext }}"
          if [ -z "$PLAINTEXT" ]; then
            PLAINTEXT="prototype-secret"
            echo "Using default: prototype-secret"
          fi

          # Rsync the hash script to VPS
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/set-app-b-hash.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/set-app-b-hash.sh

          # Execute remotely
          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "chmod +x /tmp/set-app-b-hash.sh && /tmp/set-app-b-hash.sh '$PLAINTEXT' && rm -f /tmp/set-app-b-hash.sh"
