name: VPS Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - check-env
          - set-app-b-hash
      secret_plaintext:
        description: "Plaintext secret for hash generation (only for set-app-b-hash)"
        required: false
        type: string

permissions:
  contents: read

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR || '/opt/sso-prototype-dev' }}
  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  SSH_CONNECT_TIMEOUT: "20"
  SSH_RETRY_ATTEMPTS: "5"
  SSH_RETRY_DELAY_SECONDS: "15"

jobs:
  maintenance:
    name: "VPS Maintenance"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for i in 1 2 3; do
            ssh-keyscan -T 10 -p "${{ env.VPS_SSH_PORT }}" -H "${{ env.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            sleep 5
          done

      - name: Preflight SSH reachability
        run: |
          command -v nc >/dev/null 2>&1 || {
            echo "Missing required command: nc" >&2
            exit 2
          }

          echo "Checking SSH reachability for configured VPS endpoint."
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh nc -vz -w "${{ env.SSH_CONNECT_TIMEOUT }}" \
            "${{ env.VPS_HOST }}" "${{ env.VPS_SSH_PORT }}"

      - name: Check current env
        if: inputs.action == 'check-env'
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" bash <<'REMOTE'
          PROJECT_DIR="${{ env.VPS_PROJECT_DIR }}"
          echo "=== APP_B_CLIENT_SECRET_HASH ==="
          if grep -Eq "^APP_B_CLIENT_SECRET_HASH='\\\$argon2id\\\$" "$PROJECT_DIR/.env.dev" 2>/dev/null; then
            echo "SET: quoted Argon2id literal"
          else
            echo "NOT SET OR UNSAFE FORMAT"
          fi
          echo ""
          echo "=== Argon2id env params ==="
          if grep -Eq "^OIDC_CLIENT_SECRET_HASH='\\\$argon2id\\\$" "$PROJECT_DIR/.env.dev" 2>/dev/null; then
            echo "SET: quoted Argon2id literal"
          else
            echo "NOT SET OR NOT ARGON2ID"
          fi
          echo ""
          echo "=== sso-backend status ==="
          sudo docker compose -f "$PROJECT_DIR/docker-compose.dev.yml" \
            --env-file "$PROJECT_DIR/.env.dev" \
            ps sso-backend 2>/dev/null || echo "sso-backend not running"
          echo "✅ check-env complete"
          REMOTE

      - name: Generate and set APP_B hash
        if: inputs.action == 'set-app-b-hash'
        run: |
          PLAINTEXT="${{ inputs.secret_plaintext }}"
          if [ -z "$PLAINTEXT" ]; then
            PLAINTEXT="prototype-secret"
            echo "Using default: prototype-secret"
          fi

          # Rsync the hash script to VPS
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/set-app-b-hash.sh \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}":/tmp/set-app-b-hash.sh

          # Execute remotely
          bash scripts/ci-retry.sh ssh -i ~/.ssh/deploy_key \
            -p "${{ env.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "chmod +x /tmp/set-app-b-hash.sh && /tmp/set-app-b-hash.sh '$PLAINTEXT' && rm -f /tmp/set-app-b-hash.sh"
