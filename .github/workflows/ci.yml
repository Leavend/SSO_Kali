# ==============================================================================
# CI Pipeline — SSO Prototype
#
# Runs on every push to main and all pull requests.
# 3 parallel jobs: test-backend, test-frontend, build-images
# Images are pushed to GHCR only on main branch (after tests pass).
# ==============================================================================
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leavend/sso-prototype

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: PHP Backend Tests ──────────────────────────────────────────────
  test-backend:
    name: "Backend QA (PHP 8.4)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        component:
          - { name: sso-backend, path: services/sso-backend }

    defaults:
      run:
        working-directory: ${{ matrix.component.path }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_pgsql, redis, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ${{ matrix.component.path }}/vendor
          key: composer-${{ matrix.component.name }}-${{ hashFiles(format('{0}/composer.lock', matrix.component.path)) }}
          restore-keys: composer-${{ matrix.component.name }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Prepare Laravel runtime directories
        run: mkdir -p storage/app storage/framework/cache storage/framework/sessions storage/framework/testing storage/framework/views storage/logs bootstrap/cache

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse app/Actions/Audit/RecordLogoutAuditEventAction.php app/Actions/Oidc/PerformSingleSignOut.php app/Actions/Oidc/ValidateProductionOidcClientRegistryAction.php app/Services/Oidc/BackChannelLogoutDispatcher.php app/Jobs/DispatchBackChannelLogoutJob.php --level=5 --memory-limit=512M --no-progress

      - name: Pest (unit tests)
        run: vendor/bin/pest tests/Feature/Admin/AdminAuthenticationAuditApiContractTest.php tests/Feature/DevOps/AdminAuthenticationAuditApiEvidenceTest.php tests/Feature/ExternalIdp/ExternalIdpAuthenticationAuditContractTest.php tests/Feature/DevOps/ExternalIdpAuthenticationAuditContractEvidenceTest.php tests/Feature/Oidc/LogoutAuthenticationAuditContractTest.php tests/Feature/DevOps/LogoutAuthenticationAuditContractEvidenceTest.php tests/Feature/Oidc/TokenRevocationAuditContractTest.php tests/Feature/DevOps/TokenRevocationAuditContractEvidenceTest.php tests/Feature/Oidc/TokenLifecycleAuditContractTest.php tests/Feature/DevOps/TokenLifecycleAuditContractEvidenceTest.php tests/Feature/Oidc/AuthorizationRequestAuditContractTest.php tests/Feature/DevOps/AuthorizationRequestAuditContractEvidenceTest.php tests/Feature/Auth/LoginSuccessFailureAuditContractTest.php tests/Feature/DevOps/LoginSuccessFailureAuditContractEvidenceTest.php tests/Feature/Auth/CentralAuthenticationAuditEventStoreTest.php tests/Feature/DevOps/CentralAuthenticationAuditEventStoreEvidenceTest.php tests/Feature/Auth/AuthenticationAuditDomainModelTest.php tests/Feature/DevOps/AuthenticationAuditDomainEvidenceTest.php tests/Feature/DevOps/CompletedProductionHardeningEvidenceTest.php tests/Feature/DevOps/ProductionCodeQualityGuardrailEvidenceTest.php tests/Feature/DevOps/ProductionRuntimeHardeningEvidenceTest.php tests/Feature/DevOps/ProductionAdminHardeningEvidenceTest.php tests/Feature/DevOps/ProductionOidcHardeningEvidenceTest.php tests/Feature/Admin/RbacPolicyContractTest.php tests/Feature/Admin/AdminPermissionMiddlewareTest.php tests/Feature/Admin/UserManagementBackendTest.php tests/Feature/Admin/AdminPermissionMatrixMenuContractTest.php tests/Feature/Admin/AdminPrincipalBootstrapGateTest.php tests/Feature/DevOps/AdminBackendCoverageEvidenceTest.php tests/Feature/DevOps/AdminRbacDomainEvidenceTest.php tests/Feature/DevOps/AdminUserManagementEvidenceTest.php tests/Feature/DevOps/AdminMenuAuthorizationEvidenceTest.php tests/Feature/DevOps/AdminManagementCrudEvidenceTest.php tests/Feature/DevOps/AdminScopeManagementEvidenceTest.php tests/Feature/DevOps/UserProfilePortalEvidenceTest.php tests/Feature/DevOps/AdminAuditTrailEvidenceTest.php tests/Feature/System/ReadinessObservabilityTest.php tests/Feature/System/RequestLifecycleObservabilityTest.php tests/Feature/System/QueueMetricsControllerTest.php tests/Feature/DevOps/WorkerBootObservabilityEvidenceTest.php tests/Feature/DevOps/QueueOperationsRunbookEvidenceTest.php tests/Feature/DevOps/BackupRestoreRunbookEvidenceTest.php tests/Feature/DevOps/SecurityHardeningChecklistEvidenceTest.php tests/Feature/DevOps/GitHubActionsProductionDeployEvidenceTest.php tests/Feature/DevOps/PushTriggeredDeployLifecycleEvidenceTest.php tests/Feature/DevOps/ProductionOAuthTokenFlowSmokeEvidenceTest.php tests/Feature/DevOps/ProductionMetadataWrkSmokeEvidenceTest.php tests/Feature/DevOps/ProductionConnectionTuningEvidenceTest.php tests/Feature/DevOps/ProductionPublicDomainSmokeEvidenceTest.php tests/Feature/DevOps/LogoutAuditRedactionEvidenceTest.php tests/Feature/DevOps/BackChannelLogoutReliabilityEvidenceTest.php tests/Feature/DevOps/OAuthLoadTestClientEvidenceTest.php tests/Feature/DevOps/BackendProductionLifecycleEvidenceTest.php tests/Feature/DevOps/BackendOnlyProductionLifecycleContractTest.php tests/Feature/DevOps/LegacySsoKaliCleanupEvidenceTest.php tests/Feature/DevOps/BackendProductionTopologyEvidenceTest.php tests/Feature/DevOps/RuntimeAfterTopologyChangeEvidenceTest.php tests/Feature/Admin/AdminPrincipalBootstrapGateTest.php tests/Feature/Admin/RolePermissionManagementBackendTest.php tests/Feature/Admin/ClientManagementCrudBackendTest.php tests/Feature/Admin/ClientScopeManagementBackendTest.php tests/Feature/Admin/AdminAuditTrailContractTest.php tests/Feature/Profile/ProfilePortalBackendContractTest.php tests/Unit/Oidc/ScopePolicyTest.php tests/Feature/Oidc/UserClaimsFactoryScopeEnforcementTest.php tests/Feature/DevOps/OidcBackendCoverageEvidenceTest.php tests/Feature/Oidc/AuthorizationCodeFlowE2EContractTest.php tests/Feature/Oidc/ConsentFlowContractTest.php tests/Feature/Profile/ConnectedAppsSelfServiceRevocationContractTest.php tests/Feature/DevOps/OidcProductionSmokeEvidenceTest.php tests/Feature/DevOps/ExternalIdpCoverageEvidenceTest.php tests/Feature/ExternalIdp/ExternalIdentityProviderRegistryContractTest.php tests/Feature/ExternalIdp/ExternalIdpDiscoveryContractTest.php tests/Feature/ExternalIdp/ExternalIdpJwksContractTest.php tests/Feature/ExternalIdp/ExternalIdpAuthenticationRedirectContractTest.php tests/Feature/ExternalIdp/ExternalIdpCallbackTokenExchangeContractTest.php tests/Feature/ExternalIdp/ExternalSubjectAccountMappingContractTest.php tests/Feature/ExternalIdp/ExternalIdpFailoverPolicyContractTest.php tests/Feature/ExternalIdp/ExternalIdpHealthReadinessContractTest.php tests/Feature/ExternalIdp/ExternalIdpClaimsMappingContractTest.php tests/Feature/ExternalIdp/ExternalIdpSecurityIncidentAuditContractTest.php tests/Feature/ExternalIdp/ExternalIdpDiscoverySignatureContractTest.php tests/Feature/ExternalIdp/ExternalIdpLoginE2EContractTest.php tests/Feature/DevOps/ExternalIdpProductionSmokeEvidenceTest.php tests/Feature/Admin/ExternalIdentityProviderCrudContractTest.php tests/Feature/Admin/ExternalIdentityProviderManagementTest.php tests/Feature/Admin/ExternalIdentityProviderPermissionMatrixTest.php tests/Feature/Oidc/TokenEndpointHardeningContractTest.php tests/Feature/Oidc/JwtValidationClaimContractTest.php tests/Feature/Oidc/RefreshTokenRotationReplayContractTest.php tests/Feature/Oidc/RevocationEndpointRfc7009ContractTest.php tests/Feature/Oidc/UserInfoEndpointClaimsContractTest.php tests/Feature/Oidc/OidcIncidentAuditLoggingContractTest.php tests/Feature/Oidc/LockedProductionClientRegistryTest.php tests/Feature/Oidc/ProductionClientRegistryTest.php tests/Feature/Oidc/LoadTestClientRegistryTest.php tests/Feature/Oidc/BackChannelLogoutAcceptanceTest.php tests/Feature/Oidc/BackChannelLogoutPartialFailureContractTest.php tests/Feature/Oidc/BackChannelLogoutOperationalDrillTest.php tests/Feature/Oidc/FrontChannelLogoutFlowTest.php tests/Feature/Oidc/CentralizedLogoutTest.php tests/Unit/Oidc/DispatchBackChannelLogoutJobTest.php tests/Feature/Routing --compact
        env:
          APP_ENV: testing
          APP_KEY: base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

  # ─── Job 2: Node.js Frontend Tests ────────────────────────────────────────
  test-frontend:
    name: "Frontend QA (Node 22)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        component:
          - { name: sso-admin-vue, path: services/sso-admin-vue }

    defaults:
      run:
        working-directory: ${{ matrix.component.path }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.component.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript (strict type check)
        run: npm run typecheck

      - name: ESLint (code quality)
        run: npm run lint

      - name: Vitest (unit tests)
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          VITE_SSO_BASE_URL: https://placeholder.local
          VITE_ADMIN_BASE_URL: https://placeholder.local
          VITE_CLIENT_ID: sso-admin-panel
          NEXT_PUBLIC_SSO_BASE_URL: https://placeholder.local
          NEXT_PUBLIC_SSO_ISSUER: https://placeholder.local
          NEXT_PUBLIC_AUTHORIZE_URL: https://placeholder.local/authorize
          NEXT_PUBLIC_CALLBACK_URL: https://placeholder.local/auth/callback
          NEXT_PUBLIC_CLIENT_ID: prototype-app-a

      - name: Production smoke test
        run: npm run --if-present smoke

  # ─── Job 3: Build & Push Docker Images ─────────────────────────────────────
  build-images:
    name: "Build & Push Images"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: sso-backend
            context: ./services/sso-backend
            dockerfile: ./services/sso-backend/Dockerfile
          - name: sso-admin-vue
            context: ./services/sso-admin-vue
            dockerfile: ./services/sso-admin-vue/Dockerfile
            build-args: |
              VITE_ADMIN_BASE_URL=${{ vars.SSO_BASE_URL || 'https://dev-sso.timeh.my.id' }}
              VITE_PUBLIC_BASE_PATH=${{ vars.SSO_ADMIN_VUE_BASE_PATH || '/__vue-preview' }}
              VITE_SSO_BASE_URL=${{ vars.SSO_BASE_URL || 'https://dev-sso.timeh.my.id' }}
              VITE_ZITADEL_ISSUER_URL=${{ vars.ZITADEL_ISSUER || 'https://id.dev-sso.timeh.my.id' }}

    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}
          tags: |
            # SHA tag for every build (immutable)
            type=sha,prefix=sha-,format=short
            # Semver tags on release (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Branch name for main
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.image.build-args || '' }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          sbom: true
          provenance: mode=max

      - name: Select primary image tag
        id: image_ref
        run: |
          image_tag="$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)"
          echo "image=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Verify image
        run: |
          IMAGE_TAG="${{ steps.image_ref.outputs.image }}"
          docker pull "$IMAGE_TAG"
          echo "✅ Verified: $IMAGE_TAG"

      - name: Grype CVE scan
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          image: ${{ steps.image_ref.outputs.image }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: sarif

      - name: Require Grype SARIF evidence
        run: test -s "${{ steps.grype.outputs.sarif }}"

      - name: Upload Grype SARIF
        if: always() && steps.grype.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ matrix.image.name }}
