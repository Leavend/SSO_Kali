name: SSO Admin Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'services/sso-admin-frontend/**'
      - '.github/workflows/sso-admin-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/sso-admin-frontend/**'
      - '.github/workflows/sso-admin-frontend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/leavend/sso-kali/sso-admin-frontend
  NODE_VERSION: '22'

defaults:
  run:
    working-directory: services/sso-admin-frontend

jobs:
  # ─── Gate: Lint + Typecheck + Test ───────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/sso-admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  # ─── Build: Production bundle ────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/sso-admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_ADMIN_BASE_URL: https://admin-sso.timeh.my.id
          VITE_PUBLIC_BASE_PATH: /
          VITE_SSO_BASE_URL: https://sso.timeh.my.id
          VITE_ZITADEL_ISSUER_URL: https://id.dev-sso.timeh.my.id

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: services/sso-admin-frontend/dist
          retention-days: 7

  # ─── Docker: Build & Push Image ──────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: services/sso-admin-frontend
          file: services/sso-admin-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_ADMIN_BASE_URL=https://admin-sso.timeh.my.id
            VITE_PUBLIC_BASE_PATH=/
            VITE_SSO_BASE_URL=https://sso.timeh.my.id
            VITE_ZITADEL_ISSUER_URL=https://id.dev-sso.timeh.my.id

  # Production deploy is intentionally centralized in deploy-main.yml.
  # This workflow remains a component quality/build signal only; the live VPS
  # container is recreated by Deploy Main to VPS using the immutable sha-* tag.
