name: SSO Admin Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'services/sso-admin-frontend/**'
      - '.github/workflows/sso-admin-frontend.yml'
      # Suppress CI-only runs when push only touches unit tests, test
      # dirs, or documentation; use negated path filters because GitHub
      # Actions does not allow `paths` and `paths-ignore` together.
      - '!services/sso-admin-frontend/**/*.spec.ts'
      - '!services/sso-admin-frontend/**/__tests__/**'
      - '!services/sso-admin-frontend/**/*.md'
  pull_request:
    branches: [main]
    paths:
      - 'services/sso-admin-frontend/**'
      - '.github/workflows/sso-admin-frontend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/leavend/sso-kali/sso-admin-frontend
  NODE_VERSION: '22'

defaults:
  run:
    working-directory: services/sso-admin-frontend

jobs:
  # ─── Gate: Lint + Typecheck + Test ───────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/sso-admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  # ─── Build: Production bundle ────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/sso-admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_ADMIN_BASE_URL: https://admin-sso.timeh.my.id
          VITE_PUBLIC_BASE_PATH: /
          VITE_SSO_BASE_URL: https://sso.timeh.my.id
          VITE_ZITADEL_ISSUER_URL: https://id.dev-sso.timeh.my.id

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: services/sso-admin-frontend/dist
          retention-days: 7

  # Production Docker build and deploy are centralized in deploy-main.yml.
  # This workflow is a component quality/build signal only; the canonical
  # image is built with the immutable sha-<commit> tag by deploy-main.yml.
