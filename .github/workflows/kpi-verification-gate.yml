name: KPI Verification Gate

on:
  workflow_dispatch:
  workflow_call:

jobs:
  kpi-verification-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install observability lint dependencies
        run: python3 -m pip install --disable-pip-version-check PyYAML

      - name: Run KPI verification gate
        env:
          PROMETHEUS_BASE_URL: ${{ secrets.PROMETHEUS_BASE_URL }}
          PROMETHEUS_BEARER_TOKEN: ${{ secrets.PROMETHEUS_BEARER_TOKEN }}
        run: bash infra/qa/run-kpi-verification-gate.sh

      - name: Upload KPI verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-verification-evidence
          path: |
            test-results/kpi-verification-gate/**
