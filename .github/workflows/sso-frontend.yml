name: SSO Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/sso-frontend/**'
      - 'packages/dev-sso-parent-ui/**'
      - 'tools/frontend-security/**'
      - '.github/workflows/sso-frontend.yml'
      # Suppress CI-only runs when push only touches artifacts that never
      # affect the production build (unit tests, test dirs, docs).
      - '!services/sso-frontend/**/*.spec.ts'
      - '!services/sso-frontend/**/__tests__/**'
      - '!services/sso-frontend/**/*.md'
  pull_request:
    branches: [main]
    paths:
      - 'services/sso-frontend/**'
      - 'packages/dev-sso-parent-ui/**'
      - 'tools/frontend-security/**'
      - '.github/workflows/sso-frontend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sso-frontend
  NODE_VERSION: '24'

defaults:
  run:
    working-directory: services/sso-frontend

jobs:
  # ─── Gate: Lint + Typecheck + Test ───────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/sso-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --reporter=junit --outputFile=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: services/sso-frontend/test-results.xml

  # ─── Build: Production bundle ────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/sso-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SSO_API_URL: ''
          VITE_APP_NAME: 'Dev-SSO Portal'
          VITE_SSO_FRONTEND_BASE_URL: 'https://sso.timeh.my.id'
          VITE_OIDC_ISSUER: ''
          VITE_OIDC_CLIENT_ID: 'sso-frontend-portal'

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: services/sso-frontend/dist
          retention-days: 7

  # Production Docker build and deploy are centralized in deploy-main.yml.
  # This workflow is a component quality/build signal only; the canonical
  # image is built from root context (to include packages/dev-sso-parent-ui)
  # and pushed with the immutable sha-<commit> tag by deploy-main.yml.
