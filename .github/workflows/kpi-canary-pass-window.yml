name: KPI Canary Pass Window

on:
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  kpi-canary-pass-window:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install observability lint dependencies
        run: python3 -m pip install --disable-pip-version-check PyYAML

      - name: Run KPI canary window gate
        env:
          PROMETHEUS_BASE_URL: ${{ secrets.PROMETHEUS_BASE_URL }}
          PROMETHEUS_BEARER_TOKEN: ${{ secrets.PROMETHEUS_BEARER_TOKEN }}
          CANARY_WINDOW_HOURS: '72'
          PROMETHEUS_STEP_SECONDS: '300'
        run: bash infra/qa/run-kpi-canary-pass-window.sh

      - name: Upload KPI canary evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: kpi-canary-pass-window-evidence
          path: |
            test-results/kpi-canary-pass-window/**
