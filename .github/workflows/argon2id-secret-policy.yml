name: Argon2id Secret Policy

on:
  workflow_dispatch:
  workflow_call:

jobs:
  argon2id-secret-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install broker dependencies
        working-directory: services/sso-backend
        run: composer install --no-interaction --prefer-dist

      - name: Run Argon2id secret policy gate
        run: bash infra/qa/run-argon2id-secret-policy-gate.sh

      - name: Upload Argon2id evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: argon2id-secret-policy-evidence
          path: |
            test-results/argon2id-secret-policy/**
