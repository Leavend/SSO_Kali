# ==============================================================================
# CD Pipeline — Zero-Downtime Deployment
#
# Triggered on semantic version tags (v*).
# Pulls pre-built images from GHCR, deploys to VPS with rolling updates,
# Traefik healthcheck-gated traffic switching, and smoke tests.
# ==============================================================================
name: CD

on:
  push:
    tags: ["v*"]

  # Allow manual deployment of any tag
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g., v1.2.3 or sha-abc1234)"
        required: true
        type: string

permissions:
  contents: read
  packages: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leavend/sso-prototype
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR || '/opt/sso-prototype-dev' }}
  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  SSH_CONNECT_TIMEOUT: "20"
  SSH_RETRY_ATTEMPTS: "5"
  SSH_RETRY_DELAY_SECONDS: "15"

concurrency:
  group: cd-production
  cancel-in-progress: false # Never cancel in-progress deploys

jobs:
  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Determine deploy tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw_tag="${{ inputs.tag }}"
          else
            raw_tag="$GITHUB_REF_NAME"
          fi
          echo "raw_tag=${raw_tag}" >> "$GITHUB_OUTPUT"
          echo "tag=${raw_tag#v}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(echo $GITHUB_SHA | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for GHCR release images
        run: |
          scripts/wait-for-ghcr-images.sh \
            --tag "${{ steps.tag.outputs.tag }}" \
            --registry "${{ env.IMAGE_PREFIX }}" \
            --timeout 1200 \
            --interval 20

      - name: Require successful release CI
        if: startsWith(steps.tag.outputs.raw_tag, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --force --tags origin "${{ steps.tag.outputs.raw_tag }}" || git fetch --force --tags origin
          release_sha="$(git rev-list -n 1 "${{ steps.tag.outputs.raw_tag }}")"
          bash scripts/require-release-ci-success.sh \
            --repo "$GITHUB_REPOSITORY" \
            --workflow CI \
            --ref "${{ steps.tag.outputs.raw_tag }}" \
            --sha "$release_sha" \
            --timeout 1800 \
            --interval 20

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for i in 1 2 3; do
            ssh-keyscan -T 10 -p "${{ env.VPS_SSH_PORT }}" -H "${{ env.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Preflight SSH reachability
        run: |
          command -v nc >/dev/null 2>&1 || {
            echo "Missing required command: nc" >&2
            exit 2
          }

          echo "Checking SSH reachability for configured VPS endpoint."
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh nc -vz -w "${{ env.SSH_CONNECT_TIMEOUT }}" \
            "${{ env.VPS_HOST }}" "${{ env.VPS_SSH_PORT }}"

      - name: Prepare remote release bundle directory
        run: |
          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -p "${{ env.VPS_SSH_PORT }}"
            -o BatchMode=yes
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh ssh "${SSH_OPTS[@]}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "mkdir -p /tmp/_deploy_scripts /tmp/_deploy_bundle"

      - name: Sync deploy scripts and Compose control plane to VPS
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz --progress \
            -e "$SSH_CMD" \
            scripts/vps-deploy.sh \
            scripts/vps-login-ui-cutover.sh \
            scripts/vps-rollback.sh \
            scripts/ci-retry.sh \
            scripts/lib \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/_deploy_scripts/"

          bash scripts/ci-retry.sh rsync -avz --progress \
            -e "$SSH_CMD" \
            docker-compose.dev.yml \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/_deploy_bundle/"

      - name: Install Compose control plane on VPS
        run: |
          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -p "${{ env.VPS_SSH_PORT }}"
            -o BatchMode=yes
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh ssh "${SSH_OPTS[@]}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "set -eu
             backup='${{ env.VPS_PROJECT_DIR }}/docker-compose.dev.yml.pre-${{ steps.tag.outputs.sha_short }}'
             if [ -f '${{ env.VPS_PROJECT_DIR }}/docker-compose.dev.yml' ]; then
               sudo cp '${{ env.VPS_PROJECT_DIR }}/docker-compose.dev.yml' \"\$backup\"
             fi
             sudo install -m 0644 /tmp/_deploy_bundle/docker-compose.dev.yml '${{ env.VPS_PROJECT_DIR }}/docker-compose.dev.yml'
             sudo install -d -m 0755 '${{ env.VPS_PROJECT_DIR }}/scripts'
             sudo install -d -m 0755 '${{ env.VPS_PROJECT_DIR }}/scripts/lib'
             sudo install -m 0755 /tmp/_deploy_scripts/vps-deploy.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-deploy.sh'
             sudo install -m 0755 /tmp/_deploy_scripts/vps-login-ui-cutover.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-login-ui-cutover.sh'
             sudo install -m 0755 /tmp/_deploy_scripts/vps-rollback.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-rollback.sh'
             sudo install -m 0755 /tmp/_deploy_scripts/lib/app-b-secret-guard.sh '${{ env.VPS_PROJECT_DIR }}/scripts/lib/app-b-secret-guard.sh'
             sudo install -m 0755 /tmp/_deploy_scripts/lib/direct-green-prewarm.sh '${{ env.VPS_PROJECT_DIR }}/scripts/lib/direct-green-prewarm.sh'"

      - name: Execute zero-downtime deploy
        run: |
          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -p "${{ env.VPS_SSH_PORT }}"
            -o BatchMode=yes
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )
          CI_RETRY_ATTEMPTS="1" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh ssh "${SSH_OPTS[@]}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo bash /tmp/_deploy_scripts/vps-deploy.sh \
              --tag '${{ steps.tag.outputs.tag }}' \
              --registry '${{ env.IMAGE_PREFIX }}' \
              --project-dir '${{ env.VPS_PROJECT_DIR }}' \
              --sha '${{ steps.tag.outputs.sha_short }}'"
        env:
          DEPLOY_TAG: ${{ steps.tag.outputs.tag }}

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
