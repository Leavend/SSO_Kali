# ==============================================================================
# Rollback Pipeline — Instant Revert
#
# Manual workflow dispatch. Reverts to a specified image tag in < 30 seconds.
# No rebuild required — pulls pre-existing images from GHCR.
# ==============================================================================
name: Rollback

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: "Target tag to rollback to (e.g., v1.1.0 or sha-abc1234)"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string
      login_ui:
        description: "Login UI after rollback"
        required: true
        default: "hosted"
        type: choice
        options:
          - hosted
          - vue
          - keep

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leavend/sso-prototype
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR || '/opt/sso-prototype-dev' }}
  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  SSH_CONNECT_TIMEOUT: "20"
  SSH_RETRY_ATTEMPTS: "5"
  SSH_RETRY_DELAY_SECONDS: "15"

jobs:
  rollback:
    name: "🔄 Rollback to ${{ inputs.target_tag }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for i in 1 2 3; do
            ssh-keyscan -T 10 -p "${{ env.VPS_SSH_PORT }}" -H "${{ env.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Preflight SSH reachability
        run: |
          command -v nc >/dev/null 2>&1 || {
            echo "Missing required command: nc" >&2
            exit 2
          }

          echo "Checking SSH reachability for configured VPS endpoint."
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh nc -vz -w "${{ env.SSH_CONNECT_TIMEOUT }}" \
            "${{ env.VPS_HOST }}" "${{ env.VPS_SSH_PORT }}"

      - name: Prepare remote rollback script directory
        run: |
          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -p "${{ env.VPS_SSH_PORT }}"
            -o BatchMode=yes
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh ssh "${SSH_OPTS[@]}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "mkdir -p /tmp/_deploy_scripts"

      - name: Sync rollback script
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ env.VPS_SSH_PORT }} -o BatchMode=yes -o ConnectTimeout=${{ env.SSH_CONNECT_TIMEOUT }} -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          export CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}"
          export CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}"

          bash scripts/ci-retry.sh rsync -avz -e "$SSH_CMD" \
            scripts/vps-login-ui-cutover.sh \
            scripts/vps-rollback.sh \
            scripts/lib \
            "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/_deploy_scripts/"

      - name: Execute rollback
        run: |
          echo "🔄 Rolling back to ${{ inputs.target_tag }}"
          echo "📝 Reason: ${{ inputs.reason }}"
          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -p "${{ env.VPS_SSH_PORT }}"
            -o BatchMode=yes
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh ssh "${SSH_OPTS[@]}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo bash /tmp/_deploy_scripts/vps-rollback.sh \
              --tag '${{ inputs.target_tag }}' \
              --registry '${{ env.IMAGE_PREFIX }}' \
              --project-dir '${{ env.VPS_PROJECT_DIR }}'"

      - name: Apply login UI rollback policy
        if: ${{ inputs.login_ui != 'keep' }}
        run: |
          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -p "${{ env.VPS_SSH_PORT }}"
            -o BatchMode=yes
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )
          CI_RETRY_ATTEMPTS="${{ env.SSH_RETRY_ATTEMPTS }}" \
          CI_RETRY_DELAY_SECONDS="${{ env.SSH_RETRY_DELAY_SECONDS }}" \
          bash scripts/ci-retry.sh ssh "${SSH_OPTS[@]}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}" \
            "sudo bash /tmp/_deploy_scripts/vps-login-ui-cutover.sh \
              --mode '${{ inputs.login_ui }}' \
              --project-dir '${{ env.VPS_PROJECT_DIR }}' \
              --tag '${{ inputs.target_tag }}'"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
