name: Deploy Main to VPS

on:
  push:
    branches: [main]
    # Skip a full VPS rebuild/redeploy when a push only touches artifacts that
    # never ship in the runtime images (unit tests, test dirs, docs/markdown).
    # CI workflows still run on these paths; only the production deploy is
    # suppressed. A push is skipped only when ALL changed files match below.
    paths-ignore:
      - '**/*.spec.ts'
      - '**/__tests__/**'
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      deploy_tag:
        description: "Optional image tag to deploy. Defaults to sha-<commit>."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: sso-kali-main-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leavend/sso-kali
  VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR || '/opt/sso-backend-prod' }}
  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  # Increase default attempts significantly. The VPS firewall / fail2ban can
  # block GitHub Actions runner IPs for several minutes; exponential backoff
  # in the retry helper (20 → 40 → 80 → 120s capped) means 8 attempts can
  # wait up to ~12 minutes total — well past any standard ban window.
  VPS_SSH_ATTEMPTS: ${{ vars.VPS_SSH_ATTEMPTS || '8' }}
  VPS_SSH_COMMAND_TIMEOUT: ${{ vars.VPS_SSH_COMMAND_TIMEOUT || '60' }}
  COMPOSE_PROJECT_NAME: sso-backend-prod

jobs:
  build-and-deploy:
    name: Build images and deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: sso-backend
            context: ./services/sso-backend
            dockerfile: ./services/sso-backend/Dockerfile
          - service: sso-frontend
            context: ./
            dockerfile: ./services/sso-frontend/Dockerfile
            build_args: |
              VITE_SSO_API_URL=
              VITE_SSO_BASE_URL=${{ vars.SSO_PUBLIC_BASE_URL || 'https://api-sso.timeh.my.id' }}
              VITE_SSO_FRONTEND_BASE_URL=${{ vars.SSO_FRONTEND_BASE_URL || 'https://sso.timeh.my.id' }}
              VITE_ADMIN_FRONTEND_ORIGIN=${{ vars.SSO_ADMIN_FRONTEND_URL || 'https://admin-sso.timeh.my.id' }}
              VITE_CLIENT_ID=sso-frontend-portal
              VITE_APP_NAME=Dev-SSO Portal
              VITE_OIDC_ISSUER=${{ vars.SSO_PUBLIC_BASE_URL || 'https://api-sso.timeh.my.id' }}
              VITE_OIDC_CLIENT_ID=sso-frontend-portal
              VITE_OIDC_REDIRECT_URI=${{ vars.SSO_FRONTEND_BASE_URL || 'https://sso.timeh.my.id' }}/auth/callback
          - service: sso-admin-frontend
            context: ./services/sso-admin-frontend
            dockerfile: ./services/sso-admin-frontend/Dockerfile
            build_args: |
              VITE_ADMIN_BASE_URL=${{ vars.SSO_ADMIN_FRONTEND_URL || 'https://admin-sso.timeh.my.id' }}
              VITE_PUBLIC_BASE_PATH=${{ vars.SSO_ADMIN_FRONTEND_BASE_PATH || '/' }}
              VITE_SSO_BASE_URL=${{ vars.SSO_FRONTEND_BASE_URL || 'https://sso.timeh.my.id' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set deploy tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.deploy_tag }}" ]; then
            tag="${{ inputs.deploy_tag }}"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:main
          build-args: ${{ matrix.build_args || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy baseline services
    runs-on: ubuntu-latest
    # 60 min: nc readiness gate (up to 6 min) + SSH retry backoff (up to ~12 min
    # per SSH step) + actual deploy + smoke. Enough margin for fail2ban bans.
    timeout-minutes: 60
    needs: build-and-deploy
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set deploy tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.deploy_tag }}" ]; then
            tag="${{ inputs.deploy_tag }}"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "${VPS_SSH_KEY}" || { echo "VPS_SSH_KEY secret is required" >&2; exit 1; }
          test -n "${VPS_HOST}" || { echo "VPS_HOST secret is required" >&2; exit 1; }

          mkdir -p ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          # Prefer an operator-pinned host key (set the VPS_SSH_KNOWN_HOSTS
          # secret to `ssh-keyscan <host>` output) — most secure and zero
          # extra connections to port 22.
          if [ -n "${VPS_SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${VPS_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            # Single, best-effort host-key fetch — deliberately NOT a retry loop.
            # One attempt keeps the connection count low; on failure ssh config
            # falls back to StrictHostKeyChecking=accept-new on first connection.
            ssh-keyscan -T 10 -p "${{ env.VPS_SSH_PORT }}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null \
              || echo "ssh-keyscan returned no key; relying on StrictHostKeyChecking=accept-new on first SSH." >&2
          fi

          # Enable SSH multiplexing to reuse a single Master connection across all deployment steps,
          # completely avoiding connection rate limits, SSH timeouts, and ufw limit/fail2ban bans.
          cat > ~/.ssh/config <<'EOF'
          Host *
            ControlMaster auto
            ControlPath ~/.ssh/control-%r@%h:%p
            ControlPersist 15m
            StrictHostKeyChecking accept-new
            ConnectTimeout 20
            ServerAliveInterval 10
            ServerAliveCountMax=3
          EOF
          chmod 600 ~/.ssh/config

      - name: Define SSH retry helpers
        shell: bash
        run: |
          cat > /tmp/sso-backend-ssh-helpers.sh <<'EOF'
          set -euo pipefail

          # Exponential backoff: 20 → 40 → 80 → 120s (capped). With 8 default
          # attempts the helper can wait up to ~12 min total, which outlasts
          # typical VPS firewall / fail2ban block windows.
          ssh_with_retry() {
            local attempt delay=20
            for attempt in $(seq 1 "${VPS_SSH_ATTEMPTS}"); do
              if timeout "${VPS_SSH_COMMAND_TIMEOUT}s" ssh -i ~/.ssh/deploy_key -p "${VPS_SSH_PORT}" \
                -o BatchMode=yes \
                -o ConnectTimeout=20 \
                -o ConnectionAttempts=1 \
                -o RequestTTY=no \
                -o StrictHostKeyChecking=accept-new \
                -o ServerAliveInterval=10 \
                -o ServerAliveCountMax=3 \
                "$@"; then
                return 0
              fi
              echo "ssh attempt ${attempt}/${VPS_SSH_ATTEMPTS} failed; retrying in ${delay}s..." >&2
              sleep "$delay"
              [ "$delay" -lt 120 ] && delay=$(( delay * 2 )) || true
            done
            return 1
          }

          rsync_with_retry() {
            local attempt delay=20
            for attempt in $(seq 1 "${VPS_SSH_ATTEMPTS}"); do
              if timeout "${VPS_SSH_COMMAND_TIMEOUT}s" rsync -az -e "ssh -i ~/.ssh/deploy_key -p ${VPS_SSH_PORT} -o BatchMode=yes -o ConnectTimeout=20 -o ConnectionAttempts=1 -o RequestTTY=no -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=10 -o ServerAliveCountMax=3" "$@"; then
                return 0
              fi
              echo "rsync attempt ${attempt}/${VPS_SSH_ATTEMPTS} failed; retrying in ${delay}s..." >&2
              sleep "$delay"
              [ "$delay" -lt 120 ] && delay=$(( delay * 2 )) || true
            done
            return 1
          }
          EOF

      - name: Wait for VPS SSH port availability
        # Poll the SSH port and fail with clear operator guidance once the wait
        # window is exhausted. Default 1500s (25 min): observed firewall/fail2ban
        # bans on GitHub runner IPs have exceeded 10 min, so a shorter window
        # forced manual re-runs. 25 min outlasts typical fail2ban bantimes for a
        # hands-off recovery, polls gently (nc, no auth → cannot extend the ban),
        # and still fits the 60 min job timeout alongside the SSH retry budget.
        # The step still fails fast with the runner IP + unban hints if the port
        # is genuinely unreachable. Tune via the VPS_SSH_PORT_WAIT_SECONDS var.
        shell: bash
        env:
          VPS_SSH_PORT_WAIT_SECONDS: ${{ vars.VPS_SSH_PORT_WAIT_SECONDS || '1500' }}
        run: |
          set -euo pipefail
          host="${{ secrets.VPS_HOST }}"
          port="${VPS_SSH_PORT}"
          wait_seconds="${VPS_SSH_PORT_WAIT_SECONDS}"
          interval=10
          runner_ip="$(curl -fsS --max-time 5 https://api.ipify.org 2>/dev/null || echo 'unknown')"

          echo "Runner outgoing IP: ${runner_ip}"
          echo "Probing VPS port ${port} for SSH availability for up to ${wait_seconds}s..."

          deadline=$((SECONDS + wait_seconds))
          attempt=1
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            if nc -z -w 5 "$host" "$port" 2>/dev/null; then
              echo "VPS port ${port} is reachable (probe ${attempt})."
              exit 0
            fi
            echo "Port not reachable (probe ${attempt}); retrying in ${interval}s..."
            attempt=$((attempt + 1))
            sleep "${interval}"
          done

          echo "::error::VPS SSH port ${port} is unreachable from runner IP ${runner_ip} after ${wait_seconds}s."
          echo "If blocked by VPS firewall/fail2ban, unban runner IP manually:"
          echo "  sudo fail2ban-client unban ${runner_ip}"
          echo "  sudo ufw delete deny from ${runner_ip}"
          exit 1

      - name: Prepare remote directories
        id: prepare_remote
        shell: bash
        run: |
          source /tmp/sso-backend-ssh-helpers.sh
          ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /tmp/sso-backend-deploy '${{ env.VPS_PROJECT_DIR }}/scripts'"

      - name: Sync deployment control files
        shell: bash
        run: |
          source /tmp/sso-backend-ssh-helpers.sh
          rsync_with_retry \
            scripts/vps-deploy-main.sh \
            scripts/vps-apply-sso-operational-route-optimization.sh \
            scripts/vps-apply-sso-admin-frontend-route.sh \
            docker-compose.main.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/sso-backend-deploy/"

      - name: Install control files on VPS
        shell: bash
        run: |
          source /tmp/sso-backend-ssh-helpers.sh
          ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -e
             install -m 0644 /tmp/sso-backend-deploy/docker-compose.main.yml '${{ env.VPS_PROJECT_DIR }}/docker-compose.main.yml'
             install -m 0755 /tmp/sso-backend-deploy/vps-deploy-main.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-deploy-main.sh'
             install -m 0755 /tmp/sso-backend-deploy/vps-apply-sso-operational-route-optimization.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-apply-sso-operational-route-optimization.sh'
             install -m 0755 /tmp/sso-backend-deploy/vps-apply-sso-admin-frontend-route.sh '${{ env.VPS_PROJECT_DIR }}/scripts/vps-apply-sso-admin-frontend-route.sh'"

      - name: Install production env on VPS
        shell: bash
        env:
          VPS_ENV_PROD: ${{ secrets.VPS_ENV_PROD }}
        run: |
          if [ -z "${VPS_ENV_PROD}" ]; then
            echo "VPS_ENV_PROD is not configured; remote deploy will use existing env file."
            exit 0
          fi
          printf '%s\n' "${VPS_ENV_PROD}" > /tmp/sso-backend.env.prod
          chmod 600 /tmp/sso-backend.env.prod
          source /tmp/sso-backend-ssh-helpers.sh
          rsync_with_retry \
            /tmp/sso-backend.env.prod \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/sso-backend-deploy/.env.prod"
          ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "install -m 0600 /tmp/sso-backend-deploy/.env.prod '${{ env.VPS_PROJECT_DIR }}/.env.prod'"
          rm -f /tmp/sso-backend.env.prod

      - name: Login VPS to GHCR
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${GHCR_USERNAME}" || { echo "GHCR username is required" >&2; exit 1; }
          test -n "${GHCR_TOKEN}" || { echo "GHCR token is required" >&2; exit 1; }

          source /tmp/sso-backend-ssh-helpers.sh
          # Pipe the token via a temp file to work within ssh_with_retry.
          token_file="$(mktemp)"
          printf '%s' "${GHCR_TOKEN}" > "$token_file"
          chmod 600 "$token_file"
          ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail
             export DOCKER_CONFIG='/tmp/sso-backend-deploy/.docker'
             mkdir -p \"\${DOCKER_CONFIG}\"
             chmod 0700 \"\${DOCKER_CONFIG}\"
             docker login '${{ env.REGISTRY }}' -u '${GHCR_USERNAME}' --password-stdin" \
            < "$token_file"
          rm -f "$token_file"

      - name: Execute deploy on VPS
        shell: bash
        run: |
          source /tmp/sso-backend-ssh-helpers.sh
          ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "IMAGE_PREFIX='${{ env.IMAGE_PREFIX }}' \
             DEPLOY_TAG='${{ steps.tag.outputs.tag }}' \
             PROJECT_DIR='${{ env.VPS_PROJECT_DIR }}' \
             COMPOSE_PROJECT_NAME='${{ env.COMPOSE_PROJECT_NAME }}' \
             DOCKER_CONFIG='/tmp/sso-backend-deploy/.docker' \
             bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-deploy-main.sh'"

      - name: Cleanup VPS GHCR credentials
        if: ${{ always() && steps.prepare_remote.outcome == 'success' }}
        shell: bash
        run: |
          source /tmp/sso-backend-ssh-helpers.sh
          ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "rm -rf /tmp/sso-backend-deploy/.docker"

      - name: Apply operational route optimization on VPS
        if: ${{ vars.SSO_APPLY_OPERATIONAL_ROUTE_OPTIMIZATION != 'false' }}
        shell: bash
        run: |
          source /tmp/sso-backend-ssh-helpers.sh
          ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail
             sudo -n bash '${{ env.VPS_PROJECT_DIR }}/scripts/vps-apply-sso-operational-route-optimization.sh' --mode apply"

      - name: Apply admin frontend route on VPS
        if: ${{ vars.SSO_APPLY_ADMIN_FRONTEND_ROUTE != 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/sso-backend-ssh-helpers.sh
          route_log="$(mktemp)"
          admin_domain="${{ vars.SSO_ADMIN_DOMAIN || 'admin-sso.timeh.my.id' }}"
          admin_upstream="${{ vars.SSO_ADMIN_FRONTEND_INTERNAL_URL || 'http://127.0.0.1:3091' }}"
          certbot_email="${{ vars.CERTBOT_EMAIL || '' }}"
          skip_certbot="${{ vars.CERTBOT_EMAIL == '' && 'true' || 'false' }}"
          # Route apply script is idempotent; use ssh_with_retry to survive
          # any transient connection blips late in the deployment sequence.
          if ! ssh_with_retry "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo -n bash -s -- '$admin_domain' '$admin_upstream' '$certbot_email' '$skip_certbot' '${{ env.VPS_PROJECT_DIR }}'" \
            >"$route_log" 2>&1 <<'REMOTE'
          set -euxo pipefail
          admin_domain="$1"
          admin_upstream="$2"
          certbot_email="$3"
          skip_certbot="$4"
          project_dir="$5"
          SSO_ADMIN_DOMAIN="$admin_domain" \
          SSO_ADMIN_FRONTEND_INTERNAL_URL="$admin_upstream" \
          CERTBOT_EMAIL="$certbot_email" \
          SKIP_CERTBOT="$skip_certbot" \
          bash "$project_dir/scripts/vps-apply-sso-admin-frontend-route.sh" --mode apply
          REMOTE
          then
            echo 'admin frontend route apply failed; raw output follows:' >&2
            perl -pe 's/${{ secrets.VPS_HOST }}/[host]/g; s/${{ secrets.VPS_USER }}/[user]/g' "$route_log" >&2
            exit 1
          fi
          cat "$route_log"

      - name: Run admin frontend production smoke
        shell: bash
        run: |
          set -euo pipefail
          admin_url="${{ vars.SSO_ADMIN_FRONTEND_URL || 'https://admin-sso.timeh.my.id' }}"
          # Try HTTPS first; fallback to HTTP for HTTP-only (no cert) setups
          if ! curl -fsS --max-time 20 "${admin_url%/}/healthz" >/dev/null 2>&1; then
            admin_url="http://admin-sso.timeh.my.id"
            curl -fsS --max-time 20 "${admin_url%/}/healthz" >/dev/null
          fi
          root_headers_file="$(mktemp)"
          root_body_file="$(mktemp)"
          root_status="$(curl -sS --max-time 20 -o "$root_body_file" -D "$root_headers_file" -w '%{http_code}' \
            "${admin_url%/}/")"
          if [ "$root_status" != "200" ]; then
            echo "expected / to be served by admin SPA fallback, got HTTP $root_status" >&2
            cat "$root_headers_file" >&2
            head -c 400 "$root_body_file" >&2 || true
            exit 1
          fi
          if grep -qi '^location: .*oauth/v2/authorize\|^location: .*callbacks/upstream\|^location: .*client_id=&' "$root_headers_file"; then
            echo 'expected / not to redirect to upstream edge auth or stale browser-cache target.' >&2
            cat "$root_headers_file" >&2
            exit 1
          fi
          if ! grep -qi '^content-type: text/html' "$root_headers_file"; then
            echo 'expected / content-type text/html, got:' >&2
            cat "$root_headers_file" >&2
            exit 1
          fi
          if ! grep -qi '^cache-control: .*no-store' "$root_headers_file"; then
            echo 'expected / cache-control no-store, got:' >&2
            cat "$root_headers_file" >&2
            exit 1
          fi
          curl -fsS --max-time 20 "${admin_url%/}/oidc-foundation" >/dev/null
          home_headers_file="$(mktemp)"
          home_body_file="$(mktemp)"
          home_status="$(curl -sS --max-time 20 -o "$home_body_file" -D "$home_headers_file" -w '%{http_code}' \
            "${admin_url%/}/home")"
          if [ "$home_status" != "200" ]; then
            echo "expected /home to be served by admin SPA fallback, got HTTP $home_status" >&2
            cat "$home_headers_file" >&2
            head -c 400 "$home_body_file" >&2 || true
            exit 1
          fi
          if grep -qi '^location: .*oauth/v2/authorize\|^location: .*api-sso\.timeh\.my\.id/oauth' "$home_headers_file"; then
            echo 'expected /home not to redirect to upstream edge auth.' >&2
            cat "$home_headers_file" >&2
            exit 1
          fi
          if ! grep -qi '^content-type: text/html' "$home_headers_file"; then
            echo 'expected /home content-type text/html, got:' >&2
            cat "$home_headers_file" >&2
            exit 1
          fi
          if ! grep -qi '<div id="app"' "$home_body_file"; then
            echo 'expected /home body to be the admin SPA index shell, got:' >&2
            head -c 400 "$home_body_file" >&2 || true
            exit 1
          fi
          login_headers_file="$(mktemp)"
          login_body_file="$(mktemp)"
          login_status="$(curl -sS --max-time 20 -o "$login_body_file" -D "$login_headers_file" -w '%{http_code}' \
            "${admin_url%/}/auth/login?return_to=/dashboard")"
          if [ "$login_status" != "302" ]; then
            echo "expected /auth/login to redirect through admin BFF, got HTTP $login_status" >&2
            cat "$login_headers_file" >&2
            head -c 400 "$login_body_file" >&2 || true
            exit 1
          fi
          if grep -qi '^location: .*oauth/v2/authorize\|^location: .*callbacks/upstream\|^location: .*client_id=&' "$login_headers_file"; then
            echo 'expected /auth/login not to redirect through edge auth middleware.' >&2
            cat "$login_headers_file" >&2
            exit 1
          fi
          if ! grep -qi '^location: .*sso\.timeh\.my\.id/authorize' "$login_headers_file"; then
            echo 'expected /auth/login Location to use portal-proxied SSO /authorize endpoint.' >&2
            cat "$login_headers_file" >&2
            exit 1
          fi
          if ! grep -qi '^location: .*client_id=sso-admin-panel' "$login_headers_file"; then
            echo 'expected /auth/login Location to include sso-admin-panel client_id.' >&2
            cat "$login_headers_file" >&2
            exit 1
          fi
          if ! grep -qi '^location: .*redirect_uri=.*admin-sso\.timeh\.my\.id%2Fauth%2Fcallback' "$login_headers_file"; then
            echo 'expected /auth/login Location to return to admin BFF callback.' >&2
            cat "$login_headers_file" >&2
            exit 1
          fi
          headers_file="$(mktemp)"
          body_file="$(mktemp)"
          status="$(curl -sS --max-time 20 -o "$body_file" -D "$headers_file" -w '%{http_code}' \
            -H 'Accept: application/json' \
            "${admin_url%/}/api/admin/me")"
          if [ "$status" != "401" ]; then
            echo "expected anonymous /api/admin/me to return 401 JSON, got HTTP $status" >&2
            cat "$headers_file" >&2
            head -c 400 "$body_file" >&2 || true
            exit 1
          fi
          if ! grep -qi '^content-type: application/json' "$headers_file"; then
            echo 'expected /api/admin/me content-type application/json, got:' >&2
            cat "$headers_file" >&2
            exit 1
          fi
          if grep -qi '<!doctype html\|<html' "$body_file"; then
            echo 'expected /api/admin/me JSON body, got HTML:' >&2
            head -c 400 "$body_file" >&2 || true
            exit 1
          fi
          if ! grep -q '"error"[[:space:]]*:[[:space:]]*"no_session"' "$body_file"; then
            echo 'expected /api/admin/me anonymous body to contain error=no_session, got:' >&2
            head -c 400 "$body_file" >&2 || true
            exit 1
          fi

      - name: Run authenticated admin production smoke
        if: ${{ vars.RUN_SSO_ADMIN_AUTHENTICATED_SMOKE == 'true' }}
        shell: bash
        env:
          SSO_ADMIN_FRONTEND_URL: ${{ vars.SSO_ADMIN_FRONTEND_URL || 'https://admin-sso.timeh.my.id' }}
          SSO_ADMIN_SMOKE_COOKIE_HEADER: ${{ secrets.SSO_ADMIN_SMOKE_COOKIE_HEADER }}
          SSO_ADMIN_SMOKE_EXPECTED_EMAIL: ${{ vars.SSO_ADMIN_SMOKE_EXPECTED_EMAIL || '' }}
        run: |
          scripts/sso-admin-authenticated-production-smoke.sh

      - name: Run OIDC Backend production smoke
        if: ${{ vars.RUN_FR004_PRODUCTION_SMOKE == 'true' }}
        shell: bash
        run: |
          scripts/sso-backend-oidc-production-smoke.sh \
