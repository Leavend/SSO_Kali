name: Emergency SSO Frontend Restore

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Immutable sso-frontend image digest or tag to run"
        required: true
        type: string
      reason:
        description: "Reason for emergency frontend-only restore"
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  VPS_PROJECT_DIR: ${{ vars.VPS_PROJECT_DIR || '/opt/sso-backend-prod' }}
  VPS_SSH_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
  SSH_CONNECT_TIMEOUT: "20"
  SSH_RETRY_ATTEMPTS: "3"
  SSH_RETRY_DELAY_SECONDS: "10"

jobs:
  restore-frontend:
    name: Restore sso-frontend-prod by digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KNOWN_HOSTS: ${{ vars.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "${VPS_SSH_KEY}" || { echo "VPS_SSH_KEY secret is required" >&2; exit 1; }
          test -n "${VPS_HOST}" || { echo "VPS_HOST secret is required" >&2; exit 1; }

          mkdir -p ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          if [ -n "${VPS_SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${VPS_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -T 10 -p "${{ env.VPS_SSH_PORT }}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Execute frontend-only digest restore
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_REF: ${{ inputs.image_ref }}
          RESTORE_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          test -n "${VPS_USER}" || { echo "VPS_USER secret is required" >&2; exit 1; }

          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -p "${{ env.VPS_SSH_PORT }}"
            -o BatchMode=yes
            -o ConnectTimeout="${{ env.SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )

          REMOTE_SCRIPT=$(cat <<'REMOTE'
          set -Eeuo pipefail

          IMAGE="__IMAGE_DIGEST__"
          CONTAINER='sso-frontend-prod'
          NETWORK='sso-backend-prod_sso-main'
          BIND='127.0.0.1:3080:3000'
          ENV_FILE="/tmp/${CONTAINER}-env"
          BACKUP_NAME="${CONTAINER}-backup-$(date +%Y%m%d%H%M%S)"

          log() { printf '[frontend-restore] %s\n' "$*"; }
          die() { printf '[frontend-restore][ERROR] %s\n' "$*" >&2; exit 1; }

          case "$IMAGE" in
            ghcr.io/leavend/sso-kali/sso-frontend@sha256:*|ghcr.io/leavend/sso-kali/sso-frontend:*|ghcr.io/leavend/sso_kali/sso-frontend@sha256:*|ghcr.io/leavend/sso_kali/sso-frontend:*) ;;
            *) die "refusing unexpected image ref: $IMAGE" ;;
          esac

          log "Reason: __RESTORE_REASON__"
          command -v docker >/dev/null || die 'docker is required'
          docker network inspect "$NETWORK" >/dev/null 2>&1 || die "missing docker network: $NETWORK"

          log "Pulling target image before touching live container"
          docker pull "$IMAGE"

          log "Current frontend container:"
          docker ps -a --filter "name=^/${CONTAINER}$" --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' || true

          rm -f "$ENV_FILE"
          if docker ps -a --format '{{.Names}}' | grep -Fxq "$CONTAINER"; then
            log "Capturing existing runtime environment"
            docker inspect "$CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' > "$ENV_FILE"
            log "Renaming existing $CONTAINER to $BACKUP_NAME"
            docker stop "$CONTAINER" >/dev/null || true
            docker rename "$CONTAINER" "$BACKUP_NAME"
          fi

          if [[ ! -s "$ENV_FILE" ]] && [[ -f /opt/sso-frontend-prod/sso-frontend.env ]]; then
            cp /opt/sso-frontend-prod/sso-frontend.env "$ENV_FILE"
          fi


          log "Starting $CONTAINER from digest"
          docker run -d \
            --name "$CONTAINER" \
            --restart unless-stopped \
            --network "$NETWORK" \
            -p "$BIND" \
            --env-file "$ENV_FILE" \
            -e PORT=3000 \
            -e VITE_ADMIN_BASE_URL=https://sso.timeh.my.id \
            -e NEXT_PUBLIC_APP_BASE_URL=https://sso.timeh.my.id \
            -e VITE_SSO_BASE_URL=https://api-sso.timeh.my.id \
            -e NEXT_PUBLIC_SSO_BASE_URL=https://api-sso.timeh.my.id \
            -e VITE_CLIENT_ID=sso-frontend-portal \
            -e SSO_INTERNAL_BASE_URL=http://sso-backend:8000 \
            -e SSO_INTERNAL_TOKEN_URL=http://sso-backend:8000/token \
            -e SSO_INTERNAL_JWKS_URL=http://sso-backend:8000/jwks \
            -e SSO_INTERNAL_ADMIN_API_URL=http://sso-backend:8000/admin/api \
            -e SSO_BACKEND_UPSTREAM=sso-backend:8000 \
            -e SSO_FRONTEND_SERVER_NAME=_ \
            -e SSO_CSP_CONNECT_SRC=https://api-sso.timeh.my.id \
            "$IMAGE"

          log "Reconciling Nginx frontend proxy"
          cat >/tmp/sso-frontend-prod-nginx.conf <<'NGINX'
          server {
              listen 80;
              listen [::]:80;
              server_name sso.timeh.my.id;

              location ^~ /.well-known/acme-challenge/ {
                  root /var/www/html;
                  default_type text/plain;
              }

              location / {
                  return 301 https://$host$request_uri;
              }
          }

          server {
              listen 443 ssl http2;
              listen [::]:443 ssl http2;
              server_name sso.timeh.my.id;

              ssl_certificate     /etc/letsencrypt/live/sso.timeh.my.id/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/sso.timeh.my.id/privkey.pem;
              include             /etc/letsencrypt/options-ssl-nginx.conf;
              ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

              add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-Frame-Options "DENY" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
              add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
              add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://api-sso.timeh.my.id; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api-sso.timeh.my.id; object-src 'none'; upgrade-insecure-requests" always;

              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
              gzip_min_length 256;
              gzip_vary on;

              location / {
                  proxy_pass http://127.0.0.1:3080;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-Forwarded-Host $host;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_read_timeout 60s;
                  proxy_send_timeout 60s;
              }
          }
          NGINX
          install -m 0644 /tmp/sso-frontend-prod-nginx.conf /etc/nginx/sites-available/sso.timeh.my.id.conf
          ln -sf /etc/nginx/sites-available/sso.timeh.my.id.conf /etc/nginx/sites-enabled/sso.timeh.my.id.conf
          nginx -t
          systemctl reload nginx

          log "Waiting for health endpoint"
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3080/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [[ "$i" == 30 ]]; then
              docker logs --tail=120 "$CONTAINER" || true
              if [[ -n "$BACKUP_NAME" ]] && docker ps -a --format '{{.Names}}' | grep -Fxq "$BACKUP_NAME"; then
                log "Health failed; restoring backup $BACKUP_NAME"
                docker rm -f "$CONTAINER" >/dev/null || true
                docker rename "$BACKUP_NAME" "$CONTAINER"
                docker start "$CONTAINER" >/dev/null
              fi
              die 'frontend health check failed'
            fi
          done

          log "Running container image identity"
          docker inspect "$CONTAINER" --format 'image={{.Config.Image}} image_id={{.Image}}'

          log "Public HTTPS headers"
          curl -fsSI https://sso.timeh.my.id/ | sed -n '1,24p'

          log "Public asset hashes"
          curl -fsSL https://sso.timeh.my.id/ | grep -Eo 'assets/index-[^" ]+\.(js|css)' | sort -u || true

          log "Restore completed. Backup container: $BACKUP_NAME"
          REMOTE
          )

          REMOTE_SCRIPT="${REMOTE_SCRIPT//__IMAGE_DIGEST__/${IMAGE_REF}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__RESTORE_REASON__/${RESTORE_REASON}}"

          printf '%s\n' "$REMOTE_SCRIPT" | \
            ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" \
              "sudo bash -s"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
